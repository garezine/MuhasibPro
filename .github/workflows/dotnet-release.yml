name: Release Build - ZIP + Setup (Velopack Auto-Download)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_PATH: src/MuhasibPro.App/MuhasibPro.App.csproj
  APP_NAME: MuhasibPro.App
  PUBLISH_OUTPUT_FOLDER: publish
  ZIP_OUTPUT_FOLDER: zip
  VELOPACK_OUTPUT_FOLDER: Release
  VELOPACK_VERSION: 1.3.0 # Güncel sürümü değiştirebilirsin
  IS_PRE_RELEASE: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x.x

      - uses: kzrnm/get-net-sdk-project-versions-action@v2
        id: get-version
        with:
          proj-path: ${{ env.PROJECT_PATH }}

      - name: Publish self-contained
        run: |
          $rid = "win-x64"
          dotnet publish ${{ env.PROJECT_PATH }} -c Release -r $rid `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=true `
            --output ${{ env.PUBLISH_OUTPUT_FOLDER }}/$rid

      - name: Create ZIP package
        run: |
          $rid = "x64"
          $zipName = "${{ env.APP_NAME }}-${{ steps.get-version.outputs.version }}-$rid.zip"
          mkdir -Force ${{ env.ZIP_OUTPUT_FOLDER }}
          Compress-Archive -Path "${{ env.PUBLISH_OUTPUT_FOLDER }}/$rid/*" `
                           -DestinationPath "${{ env.ZIP_OUTPUT_FOLDER }}/$zipName"

  setup:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Velopack
        run: |
          $url = "https://github.com/Velociraptor-Games/Velopack/releases/download/v${{ env.VELOPACK_VERSION }}/Velopack.exe"
          $dest = "${GITHUB_WORKSPACE}/Velopack.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest

      - name: Combine builds and run Velopack
        run: |
          $combinedDir = "${GITHUB_WORKSPACE}/velopack_input"
          mkdir -Force $combinedDir
          Copy-Item -Path "${GITHUB_WORKSPACE}/publish/x64/*" -Destination $combinedDir -Recurse

          $setupName = "${{ env.APP_NAME }}-${{ steps.get-version.outputs.version }}-x64-setup.exe"
          .\Velopack.exe `
            --input $combinedDir `
            --output "${GITHUB_WORKSPACE}/${{ env.VELOPACK_OUTPUT_FOLDER }}/$setupName" `
            --app-name ${{ env.APP_NAME }} `
            --version ${{ steps.get-version.outputs.version }}

      - name: Generate CHANGELOG.md
        run: |
          npm install -g auto-changelog
          auto-changelog --commit-limit false --hide-credit \
            --starting-version $(git describe --tags --abbrev=0 HEAD^) \
            --ending-version ${{ github.ref_name }} \
            --output CHANGELOG.md

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-zip
          path: ${{ env.ZIP_OUTPUT_FOLDER }}/*.zip

      - name: Upload Setup + RELEASES Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-setup
          path: |
            ${{ env.VELOPACK_OUTPUT_FOLDER }}/*.exe
            ${{ env.VELOPACK_OUTPUT_FOLDER }}/*/RELEASES

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            ${{ env.ZIP_OUTPUT_FOLDER }}/*.zip
            ${{ env.VELOPACK_OUTPUT_FOLDER }}/*.exe
            ${{ env.VELOPACK_OUTPUT_FOLDER }}/*/RELEASES
          bodyFile: CHANGELOG.md
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          prerelease: ${{ env.IS_PRE_RELEASE }}
          makeLatest: true
