name: Release Build - ZIP + Setup (Velopack Auto-Download)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PROJECT_PATH: src/MuhasibPro.App/MuhasibPro.App.csproj
  APP_NAME: MuhasibPro.App
  PUBLISH_OUTPUT_FOLDER: publish
  ZIP_OUTPUT_FOLDER: zip
  VELOPACK_OUTPUT_FOLDER: Release
  VELOPACK_VERSION: 1.3.0 # Örnek, güncel sürümü değiştirebilirsin

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x.x

      - name: Publish self-contained
        run: |
          $rid = "win-x64"
          dotnet publish ${{ env.PROJECT_PATH }} -c Release -r $rid `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=true `
            --output ${{ env.PUBLISH_OUTPUT_FOLDER }}/$rid

      - name: Create ZIP package
        run: |
          $rid = "x64"
          $zipName = "${{ env.APP_NAME }}-$rid.zip"
          mkdir -Force ${{ env.ZIP_OUTPUT_FOLDER }}
          Compress-Archive -Path "${{ env.PUBLISH_OUTPUT_FOLDER }}/$rid/*" `
                           -DestinationPath "${{ env.ZIP_OUTPUT_FOLDER }}/$zipName"

  setup:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Velopack
        run: |
          $url = "https://github.com/Velociraptor-Games/Velopack/releases/download/v${{ env.VELOPACK_VERSION }}/Velopack.exe"
          $dest = "${GITHUB_WORKSPACE}/Velopack.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest

      - name: Run Velopack to create Setup
        run: |
          $inputDir = "${GITHUB_WORKSPACE}/publish/x64"
          $setupName = "${{ env.APP_NAME }}-x64-setup.exe"
          mkdir -Force "${GITHUB_WORKSPACE}/${{ env.VELOPACK_OUTPUT_FOLDER }}"
          .\Velopack.exe `
            --input $inputDir `
            --output "${GITHUB_WORKSPACE}/${{ env.VELOPACK_OUTPUT_FOLDER }}/$setupName" `
            --app-name ${{ env.APP_NAME }}

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-zip
          path: ${{ env.ZIP_OUTPUT_FOLDER }}/*.zip

      - name: Upload Setup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-setup
          path: ${{ env.VELOPACK_OUTPUT_FOLDER }}/*.exe
