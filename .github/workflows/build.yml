name: Build & Release WAP MSIX with Delta

on:
  push:
    tags:
      - 'v*' # Manuel oluşturulan tag'lerde çalışır
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore MuhasibPro.sln

    - name: Build Solution with WAP
      run: msbuild MuhasibPro.sln /p:Configuration=Release /p:UapAppxPackageBuildMode=StoreUpload /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false

    - name: Find built MSIX/MSIXBundle
      id: find-packages
      run: |
        $pkg = Get-ChildItem -Recurse -Include *.msix,*.msixbundle | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if (-not $pkg) { Write-Error "MSIX/MSIXBundle bulunamadı"; exit 1 }
        echo "main-package=$($pkg.FullName)" >> $env:GITHUB_OUTPUT
        echo "package-name=$($pkg.Name)" >> $env:GITHUB_OUTPUT

    - name: Download previous release package
      id: download-previous
      run: |
        $repo = "${{ github.repository }}"
        $prevTag = (gh release list --repo $repo --limit 1 --exclude-drafts --exclude-pre-releases --json tagName | ConvertFrom-Json).tagName
        if ($prevTag -and $prevTag -ne "${{ github.ref_name }}") {
          gh release download $prevTag --repo $repo --dir previous
          echo "has-previous=true" >> $env:GITHUB_OUTPUT
          echo "previous-version=$prevTag" >> $env:GITHUB_OUTPUT
        } else {
          echo "has-previous=false" >> $env:GITHUB_OUTPUT
        }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create delta package (if previous exists)
      if: steps.download-previous.outputs.has-previous == 'true'
      id: create-delta
      run: |
        $newPackage = "${{ steps.find-packages.outputs.main-package }}"
        $oldPackage = Get-ChildItem -Path "previous" -Include *.msix,*.msixbundle | Select-Object -First 1
        if ($oldPackage) {
          Write-Host "Creating delta package..."
          $deltaPath = Join-Path (Split-Path $newPackage -Parent) "delta.msix"
          & makeappx.exe diff /p "$($oldPackage.FullName)" /n "$newPackage" /o "$deltaPath"
          if (Test-Path $deltaPath) {
            echo "delta-package=$deltaPath" >> $env:GITHUB_OUTPUT
          }
        }

    - name: Generate update manifest
      run: |
        $manifest = @{
          version = "${{ github.ref_name }}"
          releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          packages = @{
            full = @{
              name = "${{ steps.find-packages.outputs.package-name }}"
              size = (Get-Item "${{ steps.find-packages.outputs.main-package }}").Length
              hash = (Get-FileHash -Path "${{ steps.find-packages.outputs.main-package }}" -Algorithm SHA256).Hash
              url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.find-packages.outputs.package-name }}"
            }
          }
          updateType = "full"
        }
        if ("${{ steps.create-delta.outputs.delta-package }}" -ne "") {
          $deltaFile = "${{ steps.create-delta.outputs.delta-package }}"
          $manifest.packages.delta = @{
            name = (Split-Path $deltaFile -Leaf)
            size = (Get-Item $deltaFile).Length
            hash = (Get-FileHash -Path $deltaFile -Algorithm SHA256).Hash
            url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(Split-Path $deltaFile -Leaf)"
          }
          $manifest.updateType = "delta"
        }
        $manifest | ConvertTo-Json -Depth 10 | Out-File -FilePath "update-manifest.json" -Encoding utf8

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: msix-packages
        path: |
          *.msix
          *.msixbundle
          delta.msix
          update-manifest.json

  release:
    runs-on: ubuntu-latest
    needs: build-and-package

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: msix-packages
        path: .

    - name: Create GitHub Release
      id: create-release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          *.msix
          *.msixbundle
          delta.msix
          update-manifest.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
