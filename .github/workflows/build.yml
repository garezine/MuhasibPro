# .github/workflows/dotnet-desktop-cicd.yml

name: .NET Desktop CI/CD with Delta Updates

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    env:
      SOLUTION_NAME: MuhasibPro.sln
      WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"
      RUNTIME_IDENTIFIER: win-x64
      APP_NAME: MuhasibPro

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version number
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          $tagVersion = "${{ github.ref }}".Replace("refs/tags/v", "")
          $version = "$tagVersion.0"
        } else {
          $buildNumber = ${{ github.run_number }}
          $version = "1.0.0.$buildNumber"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "build-number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version" >> $env:GITHUB_ENV
        Write-Host "Generated version: $version"

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # FİX 1: NuGet restore işlemini ayrı bir adım olarak ekleyin
    - name: Restore NuGet packages
      shell: pwsh
      run: |
        Write-Host "Restoring NuGet packages..."
        nuget restore $env:SOLUTION_NAME
        Write-Host "NuGet restore completed"

    - name: Download previous release (for delta)
      id: download-previous
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            if (releases.data.length > 0) {
              const latestRelease = releases.data[0];
              core.setOutput('has-previous', 'true');
              core.setOutput('previous-version', latestRelease.tag_name);
              
              const assets = latestRelease.assets;
              const msixAsset = assets.find(asset => asset.name.endsWith('.msix') || asset.name.endsWith('.msixbundle'));
              
              if (msixAsset) {
                core.setOutput('previous-download-url', msixAsset.browser_download_url);
                core.setOutput('previous-filename', msixAsset.name);
              }
            } else {
              core.setOutput('has-previous', 'false');
            }
          } catch (error) {
            console.log('No previous release found');
            core.setOutput('has-previous', 'false');
          }

    - name: Download previous MSIX (if exists)
      if: steps.download-previous.outputs.has-previous == 'true'
      shell: pwsh
      run: |
        $previousUrl = "${{ steps.download-previous.outputs.previous-download-url }}"
        $previousFile = "${{ steps.download-previous.outputs.previous-filename }}"
        
        if ($previousUrl -and $previousFile) {
          Write-Host "Downloading previous version: $previousFile"
          New-Item -ItemType Directory -Path "previous" -Force
          Invoke-WebRequest -Uri $previousUrl -OutFile "previous/$previousFile"
          Write-Host "Previous version downloaded successfully"
        }

    # FİX 2: Manifest güncelleme işlemini daha güvenli hale getirin
    - name: Update version in manifest
      shell: pwsh
      run: |
        $manifestPath = "src/MuhasibProWap/Package.appxmanifest"
        if (Test-Path $manifestPath) {
          Write-Host "Updating manifest at: $manifestPath"
          [xml]$manifest = Get-Content $manifestPath -Encoding UTF8
          $manifest.Package.Identity.Version = "$env:VERSION"
          $manifest.Save($manifestPath)
          Write-Host "Updated manifest version to: $env:VERSION"
          
          # Manifest içeriğini kontrol et
          Write-Host "Manifest content check:"
          Get-Content $manifestPath | Select-String "Version="
        } else {
          Write-Error "Manifest file not found at: $manifestPath"
          exit 1
        }

    - name: Restore dependencies
      run: dotnet restore $env:SOLUTION_NAME --runtime $env:RUNTIME_IDENTIFIER --verbosity normal

    # FİX 3: Build işlemini daha detaylı hale getirin ve hata kontrolü ekleyin
    - name: Build solution
      shell: pwsh
      run: |
        Write-Host "Building solution: $env:SOLUTION_NAME"
        
        $buildResult = msbuild $env:SOLUTION_NAME /p:Configuration=Release /p:Platform="x64" /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER /p:PublishReadyToRun=false /verbosity:detailed
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Solution build failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        
        Write-Host "Solution build completed successfully"

    # FİX 4: Certificate handling işlemini güvenli hale getirin
    - name: Prepare certificate directory
      shell: pwsh
      run: |
        $certDir = "MuhasibPro.Package"
        if (!(Test-Path $certDir)) {
            New-Item -ItemType Directory -Path $certDir -Force | Out-Null
            Write-Host "Created certificate directory: $certDir"
        }

    - name: Decode signing certificate
      shell: pwsh
      run: |
        try {
          $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certPath = Join-Path -Path "MuhasibPro.Package" -ChildPath "workflow_cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $pfxBytes)
          Write-Host "Certificate decoded successfully to: $certPath"
          
          # Certificate file size kontrolü
          $certSize = (Get-Item $certPath).Length
          Write-Host "Certificate file size: $certSize bytes"
        } catch {
          Write-Error "Failed to decode certificate: $_"
          exit 1
        }

    # FİX 5: MSIX build işlemini optimize edin
    - name: Create MSIX package
      shell: pwsh
      run: |
        try {
          # AppxPackages klasörünü temizle ve oluştur
          if (Test-Path "AppxPackages") {
            Remove-Item "AppxPackages" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "AppxPackages" -Force
          
          Write-Host "Building MSIX package..."
          Write-Host "WAP Project: $env:WAP_PROJECT_PATH"
          Write-Host "Version: $env:VERSION"
          
          # Absolute path kullan
          $wapProjectFullPath = Resolve-Path $env:WAP_PROJECT_PATH
          $certFullPath = Resolve-Path "MuhasibPro.Package/workflow_cert.pfx"
          
          Write-Host "Full WAP Project Path: $wapProjectFullPath"
          Write-Host "Full Certificate Path: $certFullPath"
          
          # MSBuild ile MSIX package oluştur
          $buildArgs = @(
            "`"$wapProjectFullPath`""
            "/p:Configuration=Release"
            "/p:Platform=x64"
            "/p:PackageCertificateKeyFile=`"$certFullPath`""
            "/p:PackageCertificatePassword=`"${{ secrets.PFX_KEY }}`""
            "/p:AppxPackageDir=`"AppxPackages\\`""
            "/p:AppxBundle=Always"
            "/p:GenerateAppxPackageOnBuild=true"
            "/p:PublishReadyToRun=false"
            "/p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER"
            "/verbosity:detailed"
          )
          
          Write-Host "MSBuild arguments:"
          $buildArgs | ForEach-Object { Write-Host "  $_" }
          
          $buildCmd = "msbuild " + ($buildArgs -join " ")
          Write-Host "Executing: $buildCmd"
          
          Invoke-Expression $buildCmd
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSIX package build failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          
          Write-Host "MSIX package build completed successfully"
          
          # Build sonrası dosya kontrolü
          Write-Host "Checking build output..."
          if (Test-Path "AppxPackages") {
            Get-ChildItem "AppxPackages" -Recurse | ForEach-Object {
              Write-Host "Found: $($_.FullName) (Size: $($_.Length) bytes)"
            }
          }
        } catch {
          Write-Error "MSIX build failed: $_"
          exit 1
        }

    # FİX 6: Package finding işlemini daha robust hale getirin
    - name: Find generated packages
      id: find-packages
      shell: pwsh
      run: |
        try {
          Write-Host "Searching for generated packages..."
          
          # Önce AppxPackages klasörünü kontrol et
          if (!(Test-Path "AppxPackages")) {
            Write-Error "AppxPackages directory not found!"
            exit 1
          }
          
          # Tüm dosyaları listele
          Write-Host "Contents of AppxPackages:"
          Get-ChildItem "AppxPackages" -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }
          
          # MSIX ve MSIXBUNDLE dosyalarını ara
          $msixFiles = Get-ChildItem "AppxPackages" -Recurse -Filter "*.msix" | Where-Object { $_.Name -notlike "*_Test*" -and $_.Name -notlike "*Dependencies*" }
          $msixBundleFiles = Get-ChildItem "AppxPackages" -Recurse -Filter "*.msixbundle"
          
          Write-Host "Found MSIX files: $($msixFiles.Count)"
          Write-Host "Found MSIXBUNDLE files: $($msixBundleFiles.Count)"
          
          if ($msixBundleFiles.Count -gt 0) {
            $mainPackage = $msixBundleFiles[0].FullName
            $packageType = "msixbundle"
            Write-Host "Using MSIXBUNDLE: $mainPackage"
          } elseif ($msixFiles.Count -gt 0) {
            $mainPackage = $msixFiles[0].FullName
            $packageType = "msix"
            Write-Host "Using MSIX: $mainPackage"
          } else {
            Write-Error "No MSIX package found!"
            Write-Host "Available files in AppxPackages:"
            Get-ChildItem "AppxPackages" -Recurse | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }
          
          $packageName = Split-Path -Leaf $mainPackage
          Write-Host "Selected package: $packageName"
          Write-Host "Package type: $packageType"
          Write-Host "Full path: $mainPackage"
          
          echo "main-package=$mainPackage" >> $env:GITHUB_OUTPUT
          echo "package-type=$packageType" >> $env:GITHUB_OUTPUT
          echo "package-name=$packageName" >> $env:GITHUB_OUTPUT
          
        } catch {
          Write-Error "Package finding failed: $_"
          exit 1
        }

    - name: Calculate package hash
      id: hash
      shell: pwsh
      run: |
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        
        if (!(Test-Path $packagePath)) {
          Write-Error "Package file not found: $packagePath"
          exit 1
        }
        
        $hash = Get-FileHash -Path $packagePath -Algorithm SHA256
        echo "package-hash=$($hash.Hash)" >> $env:GITHUB_OUTPUT
        Write-Host "Package hash: $($hash.Hash)"
        
        # Package bilgilerini göster
        $packageInfo = Get-Item $packagePath
        Write-Host "Package size: $($packageInfo.Length) bytes"
        Write-Host "Package created: $($packageInfo.CreationTime)"

    - name: Generate update manifest
      shell: pwsh
      run: |
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        $packageItem = Get-Item $packagePath
        
        $manifest = @{
          version = "$env:VERSION"
          buildNumber = "${{ steps.version.outputs.build-number }}"
          releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          packages = @{
            full = @{
              name = "${{ steps.find-packages.outputs.package-name }}"
              size = $packageItem.Length
              hash = "${{ steps.hash.outputs.package-hash }}"
              url = "https://github.com/${{ github.repository }}/releases/download/v$env:VERSION/${{ steps.find-packages.outputs.package-name }}"
            }
          }
          previousVersion = "${{ steps.download-previous.outputs.previous-version }}"
          updateType = "full"
        }
        
        $manifestJson = $manifest | ConvertTo-Json -Depth 10
        $manifestJson | Out-File -FilePath "update-manifest.json" -Encoding utf8
        
        Write-Host "Update manifest generated successfully:"
        Write-Host $manifestJson

    # FİX 7: Artifact upload'u daha güvenli hale getirin
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: msix-packages-${{ steps.version.outputs.version }}
        path: |
          ${{ steps.find-packages.outputs.main-package }}
          update-manifest.json
        retention-days: 90

    # FİX 8: Debug için build sonuçlarını listeleyin
    - name: List all build outputs (Debug)
      if: always()
      shell: pwsh
      run: |
        Write-Host "=== BUILD OUTPUT DEBUG ==="
        
        if (Test-Path "AppxPackages") {
          Write-Host "AppxPackages contents:"
          Get-ChildItem "AppxPackages" -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName) - $($_.Length) bytes"
          }
        }
        
        Write-Host "Current directory contents:"
        Get-ChildItem -Force | ForEach-Object {
          Write-Host "  $($_.Name) - $($_.Length) bytes"
        }

  release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: msix-packages-${{ needs.build-and-package.outputs.version }}

    - name: Verify downloaded artifacts
      run: |
        echo "📋 Verifying downloaded artifacts..."
        ls -la
        
        # MSIX/MSIXBUNDLE dosyalarını kontrol et
        msix_count=$(find . -name "*.msix" -o -name "*.msixbundle" | wc -l)
        if [ "$msix_count" -eq 0 ]; then
          echo "❌ No MSIX packages found in artifacts!"
          exit 1
        fi
        
        echo "✅ Found $msix_count MSIX package(s)"
        find . -name "*.msix" -o -name "*.msixbundle" -exec ls -lh {} \;

    - name: Create GitHub Release
      id: create-release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.build-and-package.outputs.version }}
        release_name: MuhasibPro v${{ needs.build-and-package.outputs.version }}
        body: |
          ## MuhasibPro v${{ needs.build-and-package.outputs.version }}
          
          ### 📦 Bu Sürümde
          - Otomatik build #${{ needs.build-and-package.outputs.build-number }}
          - Commit: ${{ github.sha }}
          
          ### 🚀 Kurulum
          1. Aşağıdaki MSIX paketini indirin
          2. Gerekirse sertifika kurun  
          3. Çift tıklayıp kurun
          
          ### ✨ Özellikler
          - Otomatik güncellemeler
          - Delta update desteği
          - Güvenli imza
        draft: false
        prerelease: false

    - name: Upload Release Assets
      run: |
        echo "🎁 Release assets yükleniyor..."
        
        for file in *.msix *.msixbundle; do
          if [ -f "$file" ]; then
            echo "📦 Uploading: $file ($(du -h "$file" | cut -f1))"
            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.id }}/assets?name=$file"
          fi
        done
        
        if [ -f "update-manifest.json" ]; then
          echo "📝 Uploading: update-manifest.json"
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary "@update-manifest.json" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.id }}/assets?name=update-manifest.json"
        fi
        
        echo "🎉 Release başarıyla oluşturuldu!"

  deploy-update-server:
    needs: [build-and-package, release]
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: msix-packages-${{ needs.build-and-package.outputs.version }}

    - name: Deploy to update server
      run: |
        echo "🚀 Update manifest hazırlanıyor..."
        echo "📋 Version: ${{ needs.build-and-package.outputs.version }}"
        echo "✅ Update manifest deployment ready!"
