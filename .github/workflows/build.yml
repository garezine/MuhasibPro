name: .NET Desktop CI/CD with Delta Updates

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  SOLUTION_NAME: MuhasibPro.sln
  WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"
  RUNTIME_IDENTIFIER: win-x64
  APP_NAME: MuhasibPro

jobs:
  build-and-package:
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}
      package-name: ${{ steps.find-packages.outputs.package-name }}
      package-hash: ${{ steps.hash.outputs.package-hash }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version number
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          $tagVersion = "${{ github.ref }}".Replace("refs/tags/v", "")
          $version = "$tagVersion.0"
        } else {
          $buildNumber = ${{ github.run_number }}
          $version = "1.0.0.$buildNumber"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "build-number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Setup environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - uses: microsoft/setup-msbuild@v2

    - name: Download previous release
      id: download-previous
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            if (releases.data.length > 0) {
              const latestRelease = releases.data[0];
              const assets = latestRelease.assets;
              const msixAsset = assets.find(asset => 
                asset.name.endsWith('.msix') || asset.name.endsWith('.msixbundle'));
              
              if (msixAsset) {
                return {
                  has_previous: 'true',
                  previous_url: msixAsset.browser_download_url,
                  previous_name: msixAsset.name,
                  previous_version: latestRelease.tag_name.replace('v', '')
                }
              }
            }
            return { has_previous: 'false' }
          } catch (error) {
            console.log('No previous release found');
            return { has_previous: 'false' }
          }
        result-encoding: json

    - name: Download previous package
      if: fromJson(steps.download-previous.outputs.result).has_previous == 'true'
      shell: pwsh
      run: |
        $result = '${{ steps.download-previous.outputs.result }}' | ConvertFrom-Json
        New-Item -ItemType Directory -Path "previous" -Force
        Invoke-WebRequest -Uri $result.previous_url -OutFile "previous/$($result.previous_name)"
        echo "PREVIOUS_PACKAGE=previous/$($result.previous_name)" >> $env:GITHUB_ENV
        echo "PREVIOUS_VERSION=$($result.previous_version)" >> $env:GITHUB_ENV

    - name: Install delta tools
      if: fromJson(steps.download-previous.outputs.result).has_previous == 'true'
      shell: pwsh
      run: choco install -y bsdiff

    - name: Update manifest version
      shell: pwsh
      run: |
        $manifestPath = "src/MuhasibProWap/Package.appxmanifest"
        [xml]$manifest = Get-Content $manifestPath
        $manifest.Package.Identity.Version = "$env:VERSION"
        $manifest.Save($manifestPath)

    - name: Restore dependencies
      run: dotnet restore $env:SOLUTION_NAME --runtime $env:RUNTIME_IDENTIFIER

    - name: Build solution
      run: msbuild $env:SOLUTION_NAME /p:Configuration=Release /p:Platform="x64" /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER

    - name: Create MSIX package
      run: |
        New-Item -ItemType Directory -Path "MuhasibPro.Package" -Force
        $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
        [IO.File]::WriteAllBytes("MuhasibPro.Package/workflow_cert.pfx", $pfxBytes)
        
        msbuild "$env:WAP_PROJECT_PATH" `
          /p:Configuration=Release `
          /p:Platform="x64" `
          /p:PackageCertificateKeyFile=MuhasibPro.Package/workflow_cert.pfx `
          /p:PackageCertificatePassword="${{ secrets.PFX_KEY }}" `
          /p:AppxPackageDir="AppxPackages\\" `
          /p:AppxBundle=Always `
          /p:GenerateAppxPackageOnBuild=true

    - name: Find generated packages
      id: find-packages
      shell: pwsh
      run: |
        $msixFiles = Get-ChildItem -Recurse -Filter "*.msix" | Where-Object { $_.Name -notlike "*_Test*" }
        $msixBundleFiles = Get-ChildItem -Recurse -Filter "*.msixbundle"
        
        if ($msixBundleFiles.Count -gt 0) {
          $package = $msixBundleFiles[0].FullName
          $type = "msixbundle"
        } elseif ($msixFiles.Count -gt 0) {
          $package = $msixFiles[0].FullName
          $type = "msix"
        } else {
          Write-Error "No MSIX package found!"
          exit 1
        }
        
        echo "main-package=$package" >> $env:GITHUB_OUTPUT
        echo "package-type=$type" >> $env:GITHUB_OUTPUT
        echo "package-name=$(Split-Path -Leaf $package)" >> $env:GITHUB_OUTPUT

    - name: Generate delta package
      id: generate-delta
      if: env.PREVIOUS_PACKAGE && env.PREVIOUS_VERSION
      shell: pwsh
      run: |
        $deltaFile = "delta_${{ steps.find-packages.outputs.package-name }}.patch"
        bsdiff "$env:PREVIOUS_PACKAGE" "${{ steps.find-packages.outputs.main-package }}" "$deltaFile"
        
        $deltaHash = (Get-FileHash -Path $deltaFile -Algorithm SHA256).Hash
        echo "delta-package=$deltaFile" >> $env:GITHUB_OUTPUT
        echo "delta-hash=$deltaHash" >> $env:GITHUB_OUTPUT
        echo "DELTA_FILE=$deltaFile" >> $env:GITHUB_ENV

    - name: Calculate package hash
      id: hash
      shell: pwsh
      run: |
        $hash = (Get-FileHash -Path "${{ steps.find-packages.outputs.main-package }}" -Algorithm SHA256).Hash
        echo "package-hash=$hash" >> $env:GITHUB_OUTPUT

    - name: Generate update manifest
      shell: pwsh
      run: |
        $manifest = @{
          version = "$env:VERSION"
          buildNumber = "${{ github.run_number }}"
          releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          packages = @{
            full = @{
              name = "${{ steps.find-packages.outputs.package-name }}"
              size = (Get-Item "${{ steps.find-packages.outputs.main-package }}").Length
              hash = "${{ steps.hash.outputs.package-hash }}"
              url = "https://github.com/${{ github.repository }}/releases/download/v$env:VERSION/${{ steps.find-packages.outputs.package-name }}"
            }
          }
        }

        if ("$env:DELTA_FILE" -ne "") {
          $manifest.packages.delta = @{
            name = (Split-Path -Leaf $env:DELTA_FILE)
            size = (Get-Item $env:DELTA_FILE).Length
            hash = "${{ steps.generate-delta.outputs.delta-hash }}"
            url = "https://github.com/${{ github.repository }}/releases/download/v$env:VERSION/$(Split-Path -Leaf $env:DELTA_FILE)"
          }
          $manifest.previousVersion = "$env:PREVIOUS_VERSION"
          $manifest.updateType = "delta"
        } else {
          $manifest.updateType = "full"
        }

        $manifest | ConvertTo-Json -Depth 10 | Out-File "update-manifest.json" -Encoding utf8

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-assets-${{ steps.version.outputs.version }}
        path: |
          ${{ steps.find-packages.outputs.main-package }}
          update-manifest.json
          ${{ env.DELTA_FILE }}
        retention-days: 90

  release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-assets-${{ needs.build-and-package.outputs.version }}

    - name: Create Release
      id: create-release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.build-and-package.outputs.version }}
        release_name: Release v${{ needs.build-and-package.outputs.version }}
        body: |
          Automatic release for version ${{ needs.build-and-package.outputs.version }}
          
          ### Assets
          - Full package: ${{ needs.build-and-package.outputs.package-name }}
          ${{ needs.build-and-package.outputs.delta-package && '- Delta package: ' + needs.build-and-package.outputs.delta-package || '' }}
          
          SHA256: ${{ needs.build-and-package.outputs.package-hash }}
        draft: false
        prerelease: false

    - name: Upload Release Assets
      shell: pwsh
      run: |
        $files = @(
          "${{ needs.build-and-package.outputs.package-name }}",
          "update-manifest.json"
        )
        
        if (Test-Path "${{ needs.build-and-package.outputs.delta-package }}") {
          $files += "${{ needs.build-and-package.outputs.delta-package }}"
        }

        foreach ($file in $files) {
          if (Test-Path $file) {
            Write-Host "Uploading $file..."
            curl -L -X POST `
              -H "Accept: application/vnd.github+json" `
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" `
              -H "Content-Type: application/octet-stream" `
              --data-binary "@$file" `
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.id }}/assets?name=$file"
          }
        }
