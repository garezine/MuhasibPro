# .github/workflows/dotnet-desktop-cicd.yml

name: .NET Desktop CI/CD with Delta Updates

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    env:
      SOLUTION_NAME: MuhasibPro.sln
      WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"
      RUNTIME_IDENTIFIER: win-x64
      APP_NAME: MuhasibPro

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}
      package-type: ${{ steps.find-packages.outputs.package-type }}
      package-name: ${{ steps.find-packages.outputs.package-name }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version number
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          $tagVersion = "${{ github.ref }}".Replace("refs/tags/v", "")
          $version = "$tagVersion.0"
        } else {
          $buildNumber = ${{ github.run_number }}
          $version = "1.0.0.$buildNumber"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "build-number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version" >> $env:GITHUB_ENV
        Write-Host "Generated version: $version"

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      shell: pwsh
      run: |
        Write-Host "Restoring NuGet packages..."
        nuget restore $env:SOLUTION_NAME
        Write-Host "NuGet restore completed"

    - name: Download previous release (for delta)
      id: download-previous
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            if (releases.data.length > 0) {
              const latestRelease = releases.data[0];
              core.setOutput('has-previous', 'true');
              core.setOutput('previous-version', latestRelease.tag_name);
              
              const assets = latestRelease.assets;
              const msixAsset = assets.find(asset => asset.name.endsWith('.msix') || asset.name.endsWith('.msixbundle'));
              
              if (msixAsset) {
                core.setOutput('previous-download-url', msixAsset.browser_download_url);
                core.setOutput('previous-filename', msixAsset.name);
              }
            } else {
              core.setOutput('has-previous', 'false');
            }
          } catch (error) {
            console.log('No previous release found');
            core.setOutput('has-previous', 'false');
          }

    - name: Download previous MSIX (if exists)
      if: steps.download-previous.outputs.has-previous == 'true'
      shell: pwsh
      run: |
        $previousUrl = "${{ steps.download-previous.outputs.previous-download-url }}"
        $previousFile = "${{ steps.download-previous.outputs.previous-filename }}"
        
        if ($previousUrl -and $previousFile) {
          Write-Host "Downloading previous version: $previousFile"
          New-Item -ItemType Directory -Path "previous" -Force
          Invoke-WebRequest -Uri $previousUrl -OutFile "previous/$previousFile"
          Write-Host "Previous version downloaded successfully"
        }

    - name: Update version in manifest
      shell: pwsh
      run: |
        $manifestPath = "src/MuhasibProWap/Package.appxmanifest"
        if (Test-Path $manifestPath) {
          Write-Host "Updating manifest at: $manifestPath"
          [xml]$manifest = Get-Content $manifestPath -Encoding UTF8
          $manifest.Package.Identity.Version = "$env:VERSION"
          $manifest.Save($manifestPath)
          Write-Host "Updated manifest version to: $env:VERSION"
        } else {
          Write-Error "Manifest file not found at: $manifestPath"
          exit 1
        }

    - name: Restore dependencies
      run: dotnet restore $env:SOLUTION_NAME --runtime $env:RUNTIME_IDENTIFIER --verbosity normal

    - name: Build solution
      shell: pwsh
      run: |
        Write-Host "Building solution: $env:SOLUTION_NAME"
        
        msbuild $env:SOLUTION_NAME `
          /p:Configuration=Release `
          /p:Platform="x64" `
          /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER `
          /p:PublishReadyToRun=false `
          /p:RestorePackagesConfig=false `
          /verbosity:detailed
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Solution build failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }

    # YENİ: Sertifika yönetimi optimize edildi
    - name: Prepare certificate directory
      shell: pwsh
      run: |
        $certDir = "MuhasibPro.Package"
        New-Item -ItemType Directory -Path $certDir -Force | Out-Null

    - name: Decode and prepare signing certificate
      shell: pwsh
      run: |
        try {
          # PFX sertifikasını decode et
          $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.PFX_CERTIFICATE }}")
          $pfxPath = Join-Path -Path "MuhasibPro.Package" -ChildPath "workflow_cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          Write-Host "✅ PFX certificate decoded to: $pfxPath"
          
          # CER sertifikasını oluştur (kullanıcılar için)
          $cerPath = Join-Path -Path "MuhasibPro.Package" -ChildPath "MuhasibPro_Setup_Certificate.cer"
          $password = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -AsPlainText -Force
          
          $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2
          $cert.Import($pfxPath, $password, [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::Exportable)
          [System.IO.File]::WriteAllBytes($cerPath, $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
          
          Write-Host "✅ CER certificate created: $cerPath"
          Write-Host "Certificate subject: $($cert.Subject)"
          Write-Host "Certificate expiration: $($cert.NotAfter)"
          
        } catch {
          Write-Error "❌ Certificate processing failed: $_"
          exit 1
        }

    - name: Create MSIX package
      shell: pwsh
      run: |
        try {
          $certPath = "MuhasibPro.Package/workflow_cert.pfx"
          
          if (!(Test-Path $env:WAP_PROJECT_PATH)) {
            Write-Error "WAP project file not found: $env:WAP_PROJECT_PATH"
            exit 1
          }
          
          if (!(Test-Path $certPath)) {
            Write-Error "Certificate file not found: $certPath"
            exit 1
          }
          
          if (Test-Path "AppxPackages") {
            Remove-Item "AppxPackages" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "AppxPackages" -Force
          
          # Absolute path'ler
          $wapProjectFullPath = (Resolve-Path $env:WAP_PROJECT_PATH).Path
          $certFullPath = (Resolve-Path $certPath).Path
          $outputDirFullPath = (Resolve-Path "AppxPackages").Path + "\"
          
          # Geliştirilmiş imzalama parametreleri
          msbuild "$wapProjectFullPath" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PackageCertificateKeyFile="$certFullPath" `
            /p:PackageCertificatePassword="${{ secrets.PFX_PASSWORD }}" `
            /p:AppxPackageDir="$outputDirFullPath" `
            /p:AppxBundle=Always `
            /p:GenerateAppxPackageOnBuild=true `
            /p:PublishReadyToRun=false `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /p:PackageCertificateThumbprint="$($cert.Thumbprint)" `
            /verbosity:detailed
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSIX package build failed"
            exit $LASTEXITCODE
          }
          
          Write-Host "✅ MSIX package build completed"

        } catch {
          Write-Error "MSIX build failed: $_"
          exit 1
        }

    - name: Find generated packages
      id: find-packages
      shell: pwsh
      run: |
        try {
          # MSIX dosyalarını bul
          $msixFiles = Get-ChildItem -Recurse -Include "*.msix" -ErrorAction SilentlyContinue | 
            Where-Object { $_.Name -match $env:APP_NAME }
          
          $msixBundleFiles = Get-ChildItem -Recurse -Include "*.msixbundle" -ErrorAction SilentlyContinue | 
            Where-Object { $_.Name -match $env:APP_NAME }
          
          # Öncelikle msixbundle seç
          if ($msixBundleFiles.Count -gt 0) {
            $mainPackage = $msixBundleFiles | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            $packageType = "msixbundle"
          } elseif ($msixFiles.Count -gt 0) {
            $mainPackage = $msixFiles | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            $packageType = "msix"
          } else {
            Write-Error "No MSIX packages found"
            exit 1
          }
          
          echo "main-package=$($mainPackage.FullName)" >> $env:GITHUB_OUTPUT
          echo "package-type=$packageType" >> $env:GITHUB_OUTPUT
          echo "package-name=$($mainPackage.Name)" >> $env:GITHUB_OUTPUT
          
          Write-Host "Selected package: $($mainPackage.FullName)"
          
        } catch {
          Write-Error "Package finding failed: $_"
          exit 1
        }

    - name: Calculate package hash
      id: hash
      shell: pwsh
      run: |
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        $hash = Get-FileHash -Path $packagePath -Algorithm SHA256
        echo "package-hash=$($hash.Hash)" >> $env:GITHUB_OUTPUT

    - name: Generate update manifest
      shell: pwsh
      run: |
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        $packageItem = Get-Item $packagePath
        
        $manifest = @{
          version = "$env:VERSION"
          buildNumber = "${{ steps.version.outputs.build-number }}"
          releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          packages = @{
            full = @{
              name = "${{ steps.find-packages.outputs.package-name }}"
              size = $packageItem.Length
              hash = "${{ steps.hash.outputs.package-hash }}"
              url = "https://github.com/${{ github.repository }}/releases/download/v$env:VERSION/${{ steps.find-packages.outputs.package-name }}"
            }
          }
          previousVersion = "${{ steps.download-previous.outputs.previous-version }}"
          updateType = "full"
        }
        
        $manifest | ConvertTo-Json -Depth 10 | Out-File -FilePath "update-manifest.json" -Encoding utf8

    # YENİ: CER dosyasını artifact'e ekle
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: msix-packages-${{ steps.version.outputs.version }}
        path: |
          ${{ steps.find-packages.outputs.main-package }}
          update-manifest.json
          MuhasibPro.Package/MuhasibPro_Setup_Certificate.cer
        retention-days: 90

  release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: msix-packages-${{ needs.build-and-package.outputs.version }}
        path: ./artifacts

    - name: Verify downloaded artifacts
      run: |
        echo "Artifacts directory contents:"
        ls -la artifacts/
        echo "MSIX package:"
        ls -la artifacts/*.msix* || true
        echo "CER certificate:"
        ls -la artifacts/*.cer || true

    - name: Copy artifacts to root directory
      run: |
        # MSIX ve CER dosyalarını kopyala
        find artifacts/ -name "*.msix*" -exec cp {} . \;
        find artifacts/ -name "*.cer" -exec cp {} . \;
        find artifacts/ -name "*.json" -exec cp {} . \;
        
        echo "Copied files:"
        ls -la

    - name: Create GitHub Release
      id: create-release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.build-and-package.outputs.version }}
        release_name: MuhasibPro v${{ needs.build-and-package.outputs.version }}
        body: |
          ## MuhasibPro v${{ needs.build-and-package.outputs.version }}
          
          ### 📦 Bu Sürümde
          - Otomatik build #${{ needs.build-and-package.outputs.build-number }}
          - Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          
          ### 🚀 Kurulum
          1. [Sertifikayı indirin](https://github.com/${{ github.repository }}/releases/download/v${{ needs.build-and-package.outputs.version }}/MuhasibPro_Setup_Certificate.cer) 
          2. Sertifikayı çift tıklayıp "Yerel Makine > Güvenilen Kök Sertifika Yetkilileri"ne kurun
          3. [Uygulamayı indirin](https://github.com/${{ github.repository }}/releases/download/v${{ needs.build-and-package.outputs.version }}/${{ needs.build-and-package.outputs.package-name }})
          4. MSIX paketini çift tıklayıp kurun
          
          ### 🔐 Sertifika Bilgileri
          - Yayıncı: MuhasibProSoft
          - SHA256: ${{ steps.hash.outputs.package-hash }}
        draft: false
        prerelease: false

    - name: Upload Release Assets
      run: |
        # MSIX yükle
        for file in *.msix*; do
          if [ -f "$file" ]; then
            echo "Uploading MSIX: $file"
            curl -sL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.id }}/assets?name=$file" \
              --data-binary "@$file"
          fi
        done
        
        # CER yükle
        for file in *.cer; do
          if [ -f "$file" ]; then
            echo "Uploading Certificate: $file"
            curl -sL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.id }}/assets?name=$file" \
              --data-binary "@$file"
          fi
        done
        
        # Manifest yükle
        if [ -f "update-manifest.json" ]; then
          echo "Uploading Update Manifest"
          curl -sL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.id }}/assets?name=update-manifest.json" \
            --data-binary "@update-manifest.json"
        fi

  deploy-update-server:
    needs: [build-and-package, release]
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: msix-packages-${{ needs.build-and-package.outputs.version }}

    - name: Deploy to update server
      run: |
        echo "🚀 Update server deployment skipped in this workflow"
