name: .NET Desktop CI/CD with Delta Updates

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    env:
      SOLUTION_NAME: MuhasibPro.sln
      WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"
      RUNTIME_IDENTIFIER: win-x64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Debug .NET Info
      run: dotnet --info

    - name: Debug file structure
      run: |
        Write-Host "Repository structure:"
        Get-ChildItem -Recurse -Filter "*.wapproj" | ForEach-Object { 
            Write-Host "Found wapproj: $($_.FullName)" 
        }
        Write-Host "WAP_PROJECT_PATH: $env:WAP_PROJECT_PATH"
        Write-Host "File exists check:"
        Test-Path $env:WAP_PROJECT_PATH

    - name: Restore dependencies
      run: |
        dotnet restore $env:SOLUTION_NAME --runtime $env:RUNTIME_IDENTIFIER --verbosity normal
        Write-Host "Restore completed successfully"

    - name: Build solution
      run: msbuild $env:SOLUTION_NAME /p:Configuration=Release /p:Platform="x64" /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER /p:PublishReadyToRun=false

    - name: Ensure MuhasibPro.Package directory exists
      shell: pwsh
      run: |
        if (!(Test-Path "MuhasibPro.Package")) {
            New-Item -ItemType Directory -Path "MuhasibPro.Package" | Out-Null
        }

    - name: Decode signing certificate
      shell: pwsh
      run: |
        $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
        $certPath = Join-Path -Path MuhasibPro.Package -ChildPath workflow_cert.pfx
        [IO.File]::WriteAllBytes("$certPath", $pfxBytes)

    - name: Create MSIX package
      run: |
        msbuild `"$env:WAP_PROJECT_PATH`" `
          /p:Configuration=Release `
          /p:Platform="x64" `
          /p:PackageCertificateKeyFile=workflow_cert.pfx `
          /p:PackageCertificatePassword="${{ secrets.PFX_KEY }}" `
          /p:UapAppxPackageBuildMode=StoreUpload `
          /p:AppxBundle=Always `
          /p:PublishReadyToRun=false
