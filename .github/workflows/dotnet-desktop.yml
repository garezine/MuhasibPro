# .github/workflows/dotnet-desktop-cicd.yml

name: .NET Desktop CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    env:
      SOLUTION_NAME: MuhasibPro.sln
      WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"
      RUNTIME_IDENTIFIER: win-x64

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag-name: ${{ steps.version.outputs.tag-name }}
      build-number: ${{ steps.version.outputs.build-number }}
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version number
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          $tagVersion = "${{ github.ref }}".Replace("refs/tags/v", "")
          $version = "$tagVersion.0"
          $tagName = "${{ github.ref }}".Replace("refs/tags/", "")
        } else {
          $buildNumber = ${{ github.run_number }}
          $version = "1.0.0.$buildNumber"
          $tagName = "v$version"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "tag-name=$tagName" >> $env:GITHUB_OUTPUT
        echo "build-number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore $env:SOLUTION_NAME

    - name: Update version in manifest
      shell: pwsh
      run: |
        $manifestPath = "src/MuhasibProWap/Package.appxmanifest"
        [xml]$manifest = Get-Content $manifestPath -Encoding UTF8
        $manifest.Package.Identity.Version = "$env:VERSION"
        $manifest.Save($manifestPath)
        Write-Host "Updated manifest version to: $env:VERSION"

    # === ORİJİNAL BUILD ADIMLARINIZ BURADA BAŞLIYOR ===
    - name: Restore dependencies
      run: dotnet restore $env:SOLUTION_NAME --runtime $env:RUNTIME_IDENTIFIER --verbosity normal

    - name: Build solution
      shell: pwsh
      run: |
        msbuild $env:SOLUTION_NAME /p:Configuration=Release /p:Platform="x64" /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER /p:PublishReadyToRun=false /p:RestorePackagesConfig=false /verbosity:detailed
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Solution build failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }

    - name: Prepare certificate directory
      shell: pwsh
      run: |
        $certDir = "MuhasibPro.Package"
        if (!(Test-Path $certDir)) { New-Item -ItemType Directory -Path $certDir -Force | Out-Null }

    - name: Create and install test certificate
      shell: pwsh
      run: |
        # Sizin orijinal sertifika oluşturma kodunuz.
        # Gizli (secret) değişkenlerinizi kullandığı için olduğu gibi çalışacaktır.
        $certPassword = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -Force -AsPlainText
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=MuhasibPro Test Certificate" -KeyUsage DigitalSignature -FriendlyName "MuhasibPro Test Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        $certPath = Join-Path -Path "MuhasibPro.Package" -ChildPath "test_cert.pfx"
        Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath $certPath -Password $certPassword
        echo "CERT_PATH=$certPath" >> $env:GITHUB_ENV

    - name: Create MSIX package
      shell: pwsh
      run: |
        # Sizin orijinal MSIX paketleme kodunuz.
        # Env değişkenlerini kullandığı için olduğu gibi çalışacaktır.
        $wapProjectFullPath = (Resolve-Path $env:WAP_PROJECT_PATH).Path
        $certFullPath = (Resolve-Path $env:CERT_PATH).Path
        $outputDirFullPath = (Resolve-Path "AppxPackages").Path + "\"
        msbuild "$wapProjectFullPath" /p:Configuration=Release /p:Platform=x64 /p:PackageCertificateKeyFile="$certFullPath" /p:PackageCertificatePassword="${{ secrets.PFX_PASSWORD }}" /p:AppxPackageDir="$outputDirFullPath" /p:AppxBundle=Always /p:GenerateAppxPackageOnBuild=true /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxPackageSigningEnabled=true /verbosity:detailed
        if ($LASTEXITCODE -ne 0) {
          Write-Error "MSIX package build failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }

    - name: Generate update manifest
      shell: pwsh
      run: |
        # Sizin orijinal update manifest oluşturma kodunuz.
        $mainPackage = Get-ChildItem -Recurse -Filter "*.msixbundle" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        $packageItem = Get-Item $mainPackage.FullName
        $packageHash = (Get-FileHash -Path $mainPackage.FullName -Algorithm SHA256).Hash
        $manifest = @{ version = "$env:VERSION"; releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ"); packages = @{ full = @{ name = $mainPackage.Name; size = $packageItem.Length; hash = $packageHash; url = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag-name }}/$($mainPackage.Name)" } } }
        $manifest | ConvertTo-Json -Depth 10 | Out-File -FilePath "update-manifest.json" -Encoding utf8

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/*.msixbundle
          **/*.msix
          update-manifest.json
        retention-days: 7
    # === BUILD ADIMLARI BURADA BİTİYOR ===

  release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./artifacts

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true 
        files: artifacts/*
