# .github/workflows/dotnet-desktop-cicd.yml

name: .NET Desktop CI/CD with Delta Updates

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    env:
      SOLUTION_NAME: MuhasibPro.sln
      WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"
      RUNTIME_IDENTIFIER: win-x64
      APP_NAME: MuhasibPro

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}
      tag-name: ${{ steps.version.outputs.tag-name }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # FİX 1: Tag versioning'i düzelt - mevcut tag'ı kullan, yeni tag oluşturma
    - name: Generate version number
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          # Tag'dan version'ı al (v1.0.1 -> 1.0.1.0)
          $tagVersion = "${{ github.ref }}".Replace("refs/tags/v", "")
          $version = "$tagVersion.0"
          $tagName = "${{ github.ref }}".Replace("refs/tags/", "")
          Write-Host "Using existing tag: $tagName"
          Write-Host "Version from tag: $version"
        } else {
          # Branch build için otomatik version
          $buildNumber = ${{ github.run_number }}
          $version = "1.0.0.$buildNumber"
          $tagName = "v$version"
          Write-Host "Generated version for branch: $version"
        }
        
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "build-number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        echo "tag-name=$tagName" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version" >> $env:GITHUB_ENV
        
        Write-Host "Final version: $version"
        Write-Host "Tag name: $tagName"

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      shell: pwsh
      run: |
        Write-Host "Restoring NuGet packages..."
        nuget restore $env:SOLUTION_NAME
        Write-Host "NuGet restore completed"

    - name: Download previous release (for delta)
      id: download-previous
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            if (releases.data.length > 0) {
              const latestRelease = releases.data[0];
              core.setOutput('has-previous', 'true');
              core.setOutput('previous-version', latestRelease.tag_name);
              
              const assets = latestRelease.assets;
              const msixAsset = assets.find(asset => asset.name.endsWith('.msix') || asset.name.endsWith('.msixbundle'));
              
              if (msixAsset) {
                core.setOutput('previous-download-url', msixAsset.browser_download_url);
                core.setOutput('previous-filename', msixAsset.name);
              }
            } else {
              core.setOutput('has-previous', 'false');
            }
          } catch (error) {
            console.log('No previous release found');
            core.setOutput('has-previous', 'false');
          }

    - name: Download previous MSIX (if exists)
      if: steps.download-previous.outputs.has-previous == 'true'
      shell: pwsh
      run: |
        $previousUrl = "${{ steps.download-previous.outputs.previous-download-url }}"
        $previousFile = "${{ steps.download-previous.outputs.previous-filename }}"
        
        if ($previousUrl -and $previousFile) {
          Write-Host "Downloading previous version: $previousFile"
          New-Item -ItemType Directory -Path "previous" -Force
          Invoke-WebRequest -Uri $previousUrl -OutFile "previous/$previousFile"
          Write-Host "Previous version downloaded successfully"
        }

    - name: Update version in manifest
      shell: pwsh
      run: |
        $manifestPath = "src/MuhasibProWap/Package.appxmanifest"
        if (Test-Path $manifestPath) {
          Write-Host "Updating manifest at: $manifestPath"
          [xml]$manifest = Get-Content $manifestPath -Encoding UTF8
          $manifest.Package.Identity.Version = "$env:VERSION"
          $manifest.Save($manifestPath)
          Write-Host "Updated manifest version to: $env:VERSION"
          
          # Manifest içeriğini kontrol et
          Write-Host "Manifest content check:"
          Get-Content $manifestPath | Select-String "Version="
        } else {
          Write-Error "Manifest file not found at: $manifestPath"
          exit 1
        }

    - name: Restore dependencies
      run: dotnet restore $env:SOLUTION_NAME --runtime $env:RUNTIME_IDENTIFIER --verbosity normal

    - name: Build solution
      shell: pwsh
      run: |
        Write-Host "Building solution: $env:SOLUTION_NAME"
        
        msbuild $env:SOLUTION_NAME `
          /p:Configuration=Release `
          /p:Platform="x64" `
          /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER `
          /p:PublishReadyToRun=false `
          /p:RestorePackagesConfig=false `
          /verbosity:detailed
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Solution build failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        
        Write-Host "Solution build completed successfully"

    - name: Prepare certificate directory
      shell: pwsh
      run: |
        $certDir = "MuhasibPro.Package"
        if (!(Test-Path $certDir)) {
            New-Item -ItemType Directory -Path $certDir -Force | Out-Null
            Write-Host "Created certificate directory: $certDir"
        }

    # FİX 2: Certificate handling'i güçlendir ve test sertifikası oluştur
    - name: Create and install test certificate
      shell: pwsh
      run: |
        try {
          # Test sertifikası oluştur
          $certPassword = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -Force -AsPlainText
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=MuhasibPro Test Certificate" `
                                           -KeyUsage DigitalSignature -FriendlyName "MuhasibPro Test Cert" `
                                           -CertStoreLocation "Cert:\CurrentUser\My" `
                                           -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")

          $certPassword = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -Force -AsPlainText
          $certPath = Join-Path -Path "MuhasibPro.Package" -ChildPath "test_cert.pfx"
          
          # Test sertifikayı export et
          Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath $certPath -Password $certPassword
          Write-Host "Test certificate created and exported to: $certPath"

          # CER olarak da dışa aktar (opsiyonel)
          $cerPath = "$env:GITHUB_WORKSPACE\MuhasibPro_Test_Certificate.cer"
          Export-Certificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath $cerPath

          
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\LocalMachine\TrustedPublisher -Password $certPassword
          echo "CERT_PATH=$certPath" >> $env:GITHUB_ENV
          
          # Orijinal sertifikayı da dene (varsa)
          try {
            if ("${{ secrets.PFX_CERTIFICATE }}".Length -gt 0) {
              $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.PFX_CERTIFICATE }}")
              $originalCertPath = Join-Path -Path "MuhasibPro.Package" -ChildPath "workflow_cert.pfx"
              [IO.File]::WriteAllBytes($originalCertPath, $pfxBytes)
              
              # Sertifikanın geçerliliğini test et
              $testCert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2($originalCertPath, "${{ secrets.PFX_PASSWORD }}")
              if ($testCert.HasPrivateKey) {
                Write-Host "Original certificate is valid, using it instead of test certificate"
                $certPath = $originalCertPath
              } else {
                Write-Host "Original certificate has no private key, using test certificate"
              }
              $testCert.Dispose()
            }
          } catch {
            Write-Host "Original certificate failed, using test certificate: $_"
          }
          
          echo "CERT_PATH=$certPath" >> $env:GITHUB_ENV
          
          # Certificate bilgilerini göster
          $certInfo = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2($certPath, "${{ secrets.PFX_PASSWORD }}")
          Write-Host "Certificate Subject: $($certInfo.Subject)"
          Write-Host "Certificate Issuer: $($certInfo.Issuer)"
          Write-Host "Certificate Expires: $($certInfo.NotAfter)"
          Write-Host "Has Private Key: $($certInfo.HasPrivateKey)"
          $certInfo.Dispose()
          
        } catch {
          Write-Error "Certificate handling failed: $_"
          exit 1
        }

    - name: Verify project structure
      shell: pwsh
      run: |
        Write-Host "=== PROJECT STRUCTURE VERIFICATION ==="
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Solution file check:"
        if (Test-Path $env:SOLUTION_NAME) {
          Write-Host "✅ Solution found: $env:SOLUTION_NAME"
        } else {
          Write-Host "❌ Solution NOT found: $env:SOLUTION_NAME"
        }
        
        Write-Host "WAP Project check:"
        if (Test-Path $env:WAP_PROJECT_PATH) {
          Write-Host "✅ WAP project found: $env:WAP_PROJECT_PATH"
        } else {
          Write-Host "❌ WAP project NOT found: $env:WAP_PROJECT_PATH"
          Write-Host "Available src directories:"
          if (Test-Path "src") {
            Get-ChildItem "src" -Directory | ForEach-Object { Write-Host "  $($_.Name)" }
          }
        }
        
        Write-Host "Certificate check:"
        if (Test-Path $env:CERT_PATH) {
          $certSize = (Get-Item $env:CERT_PATH).Length
          Write-Host "✅ Certificate found: $env:CERT_PATH ($certSize bytes)"
        } else {
          Write-Host "❌ Certificate NOT found: $env:CERT_PATH"
        }

    - name: Create MSIX package
      shell: pwsh
      run: |
        try {
          # Proje dosyası varlığını kontrol et
          if (!(Test-Path $env:WAP_PROJECT_PATH)) {
            Write-Error "WAP project file not found: $env:WAP_PROJECT_PATH"
            exit 1
          }
          
          # Certificate varlığını kontrol et
          if (!(Test-Path $env:CERT_PATH)) {
            Write-Error "Certificate file not found: $env:CERT_PATH"
            exit 1
          }
          
          # AppxPackages klasörünü temizle ve oluştur
          if (Test-Path "AppxPackages") {
            Remove-Item "AppxPackages" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "AppxPackages" -Force
          
          Write-Host "Building MSIX package..."
          Write-Host "WAP Project: $env:WAP_PROJECT_PATH"
          Write-Host "Version: $env:VERSION"
          Write-Host "Certificate: $env:CERT_PATH"
          
          # Absolute path'leri al
          $wapProjectFullPath = (Resolve-Path $env:WAP_PROJECT_PATH).Path
          $certFullPath = (Resolve-Path $env:CERT_PATH).Path
          $outputDirFullPath = (Resolve-Path "AppxPackages").Path + "\"
          
          Write-Host "=== Starting MSBuild ==="
          
          msbuild "$wapProjectFullPath" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PackageCertificateKeyFile="$certFullPath" `
            /p:PackageCertificatePassword="${{ secrets.PFX_PASSWORD }}" `
            /p:AppxPackageDir="$outputDirFullPath" `
            /p:AppxBundle=Always `
            /p:GenerateAppxPackageOnBuild=true `
            /p:PublishReadyToRun=false `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=true `
            /verbosity:detailed
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSIX package build failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          
          Write-Host "MSIX package build completed successfully"
          
        } catch {
          Write-Error "MSIX build failed with exception: $_"
          exit 1
        }

    - name: Find generated packages
      id: find-packages
      shell: pwsh
      run: |
        try {
          Write-Host "=== PACKAGE SEARCH ANALYSIS ==="
          
          # MSIX ve MSIXBUNDLE dosyalarını ara (tüm workspace'de)
          $msixFiles = Get-ChildItem -Recurse -Include "*.msix" -ErrorAction SilentlyContinue | Where-Object { 
            $_.Name -notlike "*_Test*" -and $_.Name -notlike "*Dependencies*" -and $_.Name -notlike "*_x86_*" -and $_.Name -notlike "*_arm*"
          }
          $msixBundleFiles = Get-ChildItem -Recurse -Include "*.msixbundle" -ErrorAction SilentlyContinue
          
          # En uygun paketi seç
          $mainPackage = $null
          $packageType = $null
          
          if ($msixBundleFiles.Count -gt 0) {
            $mainPackage = $msixBundleFiles | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            $packageType = "msixbundle"
          } elseif ($msixFiles.Count -gt 0) {
            $mainPackage = $msixFiles | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            $packageType = "msix"
          } else {
            Write-Error "No suitable MSIX package found!"
            Get-ChildItem -Recurse -Include "*.msix", "*.msixbundle" | ForEach-Object { 
              Write-Host "Found: $($_.Name)"
            }
            exit 1
          }
          
          $packageName = $mainPackage.Name
          $packageFullPath = $mainPackage.FullName
          
          Write-Host "Selected package: $packageName"
          Write-Host "Package type: $packageType"  
          Write-Host "Full path: $packageFullPath"
          
          echo "main-package=$packageFullPath" >> $env:GITHUB_OUTPUT
          echo "package-type=$packageType" >> $env:GITHUB_OUTPUT
          echo "package-name=$packageName" >> $env:GITHUB_OUTPUT
          
        } catch {
          Write-Error "Package finding failed: $_"
          exit 1
        }

    - name: Calculate package hash
      id: hash
      shell: pwsh
      run: |
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        $hash = Get-FileHash -Path $packagePath -Algorithm SHA256
        echo "package-hash=$($hash.Hash)" >> $env:GITHUB_OUTPUT
        Write-Host "Package hash: $($hash.Hash)"

    - name: Generate update manifest
      shell: pwsh
      run: |
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        $packageItem = Get-Item $packagePath
        
        $manifest = @{
          version = "$env:VERSION"
          buildNumber = "${{ steps.version.outputs.build-number }}"
          releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          packages = @{
            full = @{
              name = "${{ steps.find-packages.outputs.package-name }}"
              size = $packageItem.Length
              hash = "${{ steps.hash.outputs.package-hash }}"
              url = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag-name }}/${{ steps.find-packages.outputs.package-name }}"
            }
          }
          previousVersion = "${{ steps.download-previous.outputs.previous-version }}"
          updateType = "full"
        }
        
        $manifestJson = $manifest | ConvertTo-Json -Depth 10
        $manifestJson | Out-File -FilePath "update-manifest.json" -Encoding utf8
        
        Write-Host "Update manifest generated successfully"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: msix-packages-${{ steps.version.outputs.version }}
        path: |
          ${{ steps.find-packages.outputs.main-package }}
          update-manifest.json
        retention-days: 90

    - name: List all build outputs (Debug)
      if: always()
      shell: pwsh
      run: |
        Write-Host "=== FINAL BUILD OUTPUT DEBUG ==="
        Write-Host "Version: $env:VERSION"
        Write-Host "Tag: ${{ steps.version.outputs.tag-name }}"
        Write-Host "Package: ${{ steps.find-packages.outputs.package-name }}"
        
        Get-ChildItem -Recurse -Include "*.msix", "*.msixbundle" | ForEach-Object {
          Write-Host "Found MSIX: $($_.FullName) - $($_.Length) bytes"
        }

  release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: msix-packages-${{ needs.build-and-package.outputs.version }}
        path: ./artifacts

    - name: Verify downloaded artifacts
      run: |
        echo "📋 Verifying downloaded artifacts..."
        find artifacts/ -type f -exec ls -lh {} \;
        
        msix_count=$(find . -name "*.msix" -o -name "*.msixbundle" | wc -l)
        if [ "$msix_count" -eq 0 ]; then
          echo "❌ No MSIX packages found!"
          exit 1
        fi
        echo "✅ Found $msix_count MSIX package(s)"

    - name: Copy artifacts to root directory
      run: |
        if [ -d "artifacts" ]; then
          find artifacts/ -name "*.msix" -o -name "*.msixbundle" -o -name "*.json" | while read file; do
            filename=$(basename "$file")
            cp "$file" "$filename"
            echo "📦 Copied: $filename"
          done
        fi

    # FİX 3: Mevcut tag'ı kullan, yeni tag oluşturma - Release'i mevcut tag'e ekle
    - name: Update existing release or create new one
      id: update-release
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const tagName = '${{ needs.build-and-package.outputs.tag-name }}';
          const version = '${{ needs.build-and-package.outputs.version }}';
          
          try {
            // Mevcut release'i kontrol et
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName
            });
            
            console.log(`Found existing release: ${release.id}`);
            
            // Mevcut release'i güncelle
            const { data: updatedRelease } = await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: `## MuhasibPro v${version}
          
          ### 📦 Bu Sürümde
          - Otomatik build #${{ needs.build-and-package.outputs.build-number }}
          - Commit: ${{ github.sha }}
          
          ### 🚀 Kurulum
          1. Aşağıdaki MSIX paketini indirin
          2. **ÖNEMLİ:** İlk kurulumda Windows'a test sertifikasını güvenilir olarak eklemelisiniz
          3. Çift tıklayıp kurun
          
          ### ✨ Özellikler
          - Otomatik güncellemeler
          - Delta update desteği
          - Test sertifikası ile imzalanmış`,
              draft: false,
              prerelease: false
            });
            
            core.setOutput('release-id', updatedRelease.id);
            console.log(`Updated release: ${updatedRelease.id}`);
            
          } catch (error) {
            if (error.status === 404) {
              // Release yoksa yeni oluştur (normalde olmamalı çünkü tag zaten var)
              console.log(`Release not found for tag ${tagName}, creating new one`);
              
              const { data: newRelease } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: `MuhasibPro v${version}`,
                body: `## MuhasibPro v${version}
          
          ### 📦 Bu Sürümde
          - Otomatik build #${{ needs.build-and-package.outputs.build-number }}
          - Commit: ${{ github.sha }}
          
          ### 🚀 Kurulum
          1. Aşağıdaki MSIX paketini indirin
          2. **ÖNEMLİ:** İlk kurulumda Windows'a test sertifikasını güvenilir olarak eklemelisiniz
          3. Çift tıklayıp kurun
          
          ### ✨ Özellikler
          - Otomatik güncellemeler  
          - Delta update desteği
          - Test sertifikası ile imzalanmış`,
                draft: false,
                prerelease: false
              });
              
              core.setOutput('release-id', newRelease.id);
              console.log(`Created new release: ${newRelease.id}`);
            } else {
              throw error;
            }
          }

    - name: Upload Release Assets
      run: |
        echo "🎁 Release assets yükleniyor..."
        
        uploaded_count=0
        
        # MSIX dosyalarını yükle
        for file in *.msix *.msixbundle; do
          if [ -f "$file" ]; then
            echo "📦 Uploading: $file"
            
            curl_response=$(curl -w "%{http_code}" -s -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.update-release.outputs.release-id }}/assets?name=$file")
            
            http_code="${curl_response: -3}"
            if [ "$http_code" = "201" ]; then
              echo "✅ Successfully uploaded: $file"
              uploaded_count=$((uploaded_count + 1))
            else
              echo "❌ Failed to upload $file (HTTP: $http_code)"
            fi
          fi
        done
        
        # Update manifest'i yükle
        if [ -f "update-manifest.json" ]; then
          curl -s -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary "@update-manifest.json" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.update-release.outputs.release-id }}/assets?name=update-manifest.json"
          echo "✅ Update manifest uploaded"
        fi
        
        if [ "$uploaded_count" -eq 0 ]; then
          echo "❌ No MSIX files were uploaded!"
          exit 1
        fi
        
        echo "🎉 $uploaded_count dosya başarıyla yüklendi!"

  deploy-update-server:
    needs: [build-and-package, release]
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: msix-packages-${{ needs.build-and-package.outputs.version }}

    - name: Deploy to update server
      run: |
        echo "🚀 Update manifest hazırlanıyor..."
        echo "📋 Version: ${{ needs.build-and-package.outputs.version }}"
        echo "✅ Update manifest deployment ready!"
