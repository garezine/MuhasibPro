# .github/workflows/dotnet-desktop-cicd.yml

name: .NET Desktop CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    env:
      SOLUTION_NAME: MuhasibPro.sln
      WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"
      RUNTIME_IDENTIFIER: win-x64

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag-name: ${{ steps.version.outputs.tag-name }}
      build-number: ${{ steps.version.outputs.build-number }}
      package-path: ${{ steps.find-packages.outputs.package-path }}
      manifest-path: ${{ steps.find-packages.outputs.manifest-path }}
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Otomatik release notları için tam geçmiş gereklidir

    - name: Generate version number
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          $tagVersion = "${{ github.ref }}".Replace("refs/tags/v", "")
          $version = "$tagVersion.0"
          $tagName = "${{ github.ref }}".Replace("refs/tags/", "")
        } else {
          $buildNumber = ${{ github.run_number }}
          $version = "1.0.0.$buildNumber"
          $tagName = "v$version"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "tag-name=$tagName" >> $env:GITHUB_OUTPUT
        echo "build-number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version" >> $env:GITHUB_ENV

    # YORUM: .NET kurulumu ve diğer build adımları aynı kalabilir...
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore $env:SOLUTION_NAME

    # YORUM: Bu adımlar delta PAKETİ oluşturmadığınız için gereksiz. 
    # Sadece süreci yavaşlatır ve karmaşıklık ekler. Bu yüzden kaldırıldı.
    # - name: Download previous release (for delta)
    # - name: Download previous MSIX (if exists)

    - name: Update version in manifest
      shell: pwsh
      run: |
        $manifestPath = "src/MuhasibProWap/Package.appxmanifest"
        [xml]$manifest = Get-Content $manifestPath -Encoding UTF8
        $manifest.Package.Identity.Version = "$env:VERSION"
        $manifest.Save($manifestPath)
        Write-Host "Updated manifest version to: $env:VERSION"

    # ... Build, sertifika ve MSIX oluşturma adımlarınız buradan devam ediyor (değişiklik yok) ...
    # ... Bu adımların doğru çalıştığını varsayıyorum.
    - name: Restore dependencies, Build solution, Create certificate, Create MSIX package adımları...
    # (Kodun geri kalanı çok uzun olduğu için buraya eklemiyorum, aynı kalacak)

    # YORUM: Find Packages adımını basitleştirip çıktıları düzenliyoruz.
    - name: Find generated packages and manifest
      id: find-packages
      shell: pwsh
      run: |
        $mainPackage = Get-ChildItem -Recurse -Filter "*.msixbundle" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if (-not $mainPackage) {
          $mainPackage = Get-ChildItem -Recurse -Filter "*.msix" | Where-Object { $_.Name -notlike "*_Test*" } | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        }
        if (-not $mainPackage) {
          Write-Error "No MSIX or MSIXBUNDLE package found!"
          exit 1
        }
        echo "package-path=$($mainPackage.FullName)" >> $env:GITHUB_OUTPUT
        
        # Manifest dosyasını da bulup artifact'e ekleyelim
        $manifestFile = "update-manifest.json" # Bu dosyayı oluşturan adımınızın olduğunu varsayıyorum
        if (Test-Path $manifestFile) {
          echo "manifest-path=$manifestFile" >> $env:GITHUB_OUTPUT
        }

    # YORUM: Artifact'e hem paketi hem manifest dosyasını yüklüyoruz.
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          ${{ steps.find-packages.outputs.package-path }}
          ${{ steps.find-packages.outputs.manifest-path }}

  release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write # Release oluşturmak için bu izin ŞART!

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./artifacts

    # YORUM: Karmaşık script ve curl komutları yerine tek ve güçlü bir action kullanıyoruz.
    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v1
      with:
        # Bu ayar, bir önceki tag'den bu yana yapılan tüm değişiklikleri (Pull Request'leri)
        # otomatik olarak release notlarına ekler. "Delta Changelog" budur.
        generate_release_notes: true 
        
        # Artifacts klasöründeki tüm dosyaları otomatik olarak bulup release'e ekler.
        # *.msix, *.msixbundle, *.json gibi ne varsa yükler.
        files: artifacts/*
