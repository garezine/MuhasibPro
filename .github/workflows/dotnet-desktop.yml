name: Build and Release MuhasibPro

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore MuhasibPro.sln

      # Import certificate (from secrets)
      - name: Import and Export Certificate
        shell: pwsh
        run: |
          $pfxBase64 = "${{ secrets.PFX_CERTIFICATE }}"
          $pfxPassword = "${{ secrets.PFX_PASSWORD }}"
          $pfxBytes = [System.Convert]::FromBase64String($pfxBase64)
          $certPath = "$(Join-Path $env:USERPROFILE 'MuhasibPro.pfx')"
          [System.IO.File]::WriteAllBytes($certPath, $pfxBytes)
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $pfxPassword -Force -AsPlainText)
          $cerPath = "$(Join-Path $env:GITHUB_WORKSPACE 'MuhasibPro.cer')"
          Export-Certificate -Cert $cert -FilePath $cerPath

      # Build WAP project (MSIX + AppInstaller with delta updates)
      - name: Build WAP Project
        run: msbuild src\MuhasibProWap\MuhasibProWap.wapproj /p:Configuration=Release /p:UapAppxPackageBuildMode=StoreUpload /p:AppxBundle=Always /p:AppInstallerUri=https://github.com/garezine/MuhasibPro/releases/latest/download/ /p:PackageCertificateKeyFile="$(Join-Path $env:USERPROFILE 'MuhasibPro.pfx')" /p:PackageCertificatePassword=${{ secrets.PFX_PASSWORD }}

      - name: Upload CER artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuhasibPro-Certificate
          path: MuhasibPro.cer

      - name: Upload App Packages
        uses: actions/upload-artifact@v4
        with:
          name: MuhasibPro-AppPackages
          path: |
            **/*.msix
            **/*.msixbundle
            **/*.appinstaller

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.msix
            **/*.msixbundle
            **/*.appinstaller
            MuhasibPro.cer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
