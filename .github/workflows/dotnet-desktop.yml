# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will build, test, sign and package a WPF or Windows Forms desktop application
# built on .NET Core.
# To learn how to migrate your existing application to .NET Core,
# refer to https://docs.microsoft.com/en-us/dotnet/desktop-wpf/migration/convert-project-from-net-framework
#
# To configure this workflow:# .github/workflows/dotnet-desktop-cicd.yml

name: .NET Desktop CI/CD with Delta Updates

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    env:
      SOLUTION_NAME: MuhasibPro.sln
      WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"
      RUNTIME_IDENTIFIER: win-x64
      APP_NAME: MuhasibPro

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version number
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          $tagVersion = "${{ github.ref }}".Replace("refs/tags/v", "")
          $version = "$tagVersion.0"
        } else {
          $buildNumber = ${{ github.run_number }}
          $version = "1.0.0.$buildNumber"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "build-number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version" >> $env:GITHUB_ENV
        Write-Host "Generated version: $version"

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      shell: pwsh
      run: |
        Write-Host "Restoring NuGet packages..."
        nuget restore $env:SOLUTION_NAME
        Write-Host "NuGet restore completed"

    - name: Download previous release (for delta)
      id: download-previous
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            if (releases.data.length > 0) {
              const latestRelease = releases.data[0];
              core.setOutput('has-previous', 'true');
              core.setOutput('previous-version', latestRelease.tag_name);
              
              const assets = latestRelease.assets;
              const msixAsset = assets.find(asset => asset.name.endsWith('.msix') || asset.name.endsWith('.msixbundle'));
              
              if (msixAsset) {
                core.setOutput('previous-download-url', msixAsset.browser_download_url);
                core.setOutput('previous-filename', msixAsset.name);
              }
            } else {
              core.setOutput('has-previous', 'false');
            }
          } catch (error) {
            console.log('No previous release found');
            core.setOutput('has-previous', 'false');
          }

    - name: Download previous MSIX (if exists)
      if: steps.download-previous.outputs.has-previous == 'true'
      shell: pwsh
      run: |
        $previousUrl = "${{ steps.download-previous.outputs.previous-download-url }}"
        $previousFile = "${{ steps.download-previous.outputs.previous-filename }}"
        
        if ($previousUrl -and $previousFile) {
          Write-Host "Downloading previous version: $previousFile"
          New-Item -ItemType Directory -Path "previous" -Force
          Invoke-WebRequest -Uri $previousUrl -OutFile "previous/$previousFile"
          Write-Host "Previous version downloaded successfully"
        }

    - name: Update version in manifest
      shell: pwsh
      run: |
        $manifestPath = "src/MuhasibProWap/Package.appxmanifest"
        if (Test-Path $manifestPath) {
          Write-Host "Updating manifest at: $manifestPath"
          [xml]$manifest = Get-Content $manifestPath -Encoding UTF8
          $manifest.Package.Identity.Version = "$env:VERSION"
          $manifest.Save($manifestPath)
          Write-Host "Updated manifest version to: $env:VERSION"
          
          # Manifest içeriğini kontrol et
          Write-Host "Manifest content check:"
          Get-Content $manifestPath | Select-String "Version="
        } else {
          Write-Error "Manifest file not found at: $manifestPath"
          exit 1
        }

    - name: Restore dependencies
      run: dotnet restore $env:SOLUTION_NAME --runtime $env:RUNTIME_IDENTIFIER --verbosity normal

    - name: Build solution
      shell: pwsh
      run: |
        Write-Host "Building solution: $env:SOLUTION_NAME"
        
        msbuild $env:SOLUTION_NAME `
          /p:Configuration=Release `
          /p:Platform="x64" `
          /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER `
          /p:PublishReadyToRun=false `
          /p:RestorePackagesConfig=false `
          /verbosity:detailed
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Solution build failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        
        Write-Host "Solution build completed successfully"

    - name: Prepare certificate directory
      shell: pwsh
      run: |
        $certDir = "MuhasibPro.Package"
        if (!(Test-Path $certDir)) {
            New-Item -ItemType Directory -Path $certDir -Force | Out-Null
            Write-Host "Created certificate directory: $certDir"
        }

    - name: Decode signing certificate
      shell: pwsh
      run: |
        try {
          $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certPath = Join-Path -Path "MuhasibPro.Package" -ChildPath "workflow_cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $pfxBytes)
          Write-Host "Certificate decoded successfully to: $certPath"
          
          # Certificate file size kontrolü
          $certSize = (Get-Item $certPath).Length
          Write-Host "Certificate file size: $certSize bytes"
        } catch {
          Write-Error "Failed to decode certificate: $_"
          exit 1
        }

    - name: Verify project structure
      shell: pwsh
      run: |
        Write-Host "=== PROJECT STRUCTURE VERIFICATION ==="
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Solution file check:"
        if (Test-Path $env:SOLUTION_NAME) {
          Write-Host "✅ Solution found: $env:SOLUTION_NAME"
        } else {
          Write-Host "❌ Solution NOT found: $env:SOLUTION_NAME"
        }
        
        Write-Host "WAP Project check:"
        if (Test-Path $env:WAP_PROJECT_PATH) {
          Write-Host "✅ WAP project found: $env:WAP_PROJECT_PATH"
          Write-Host "WAP project content preview:"
          Get-Content $env:WAP_PROJECT_PATH | Select-Object -First 20
        } else {
          Write-Host "❌ WAP project NOT found: $env:WAP_PROJECT_PATH"
          Write-Host "Available src directories:"
          if (Test-Path "src") {
            Get-ChildItem "src" -Directory | ForEach-Object { Write-Host "  $($_.Name)" }
          }
        }
        
        Write-Host "Certificate check:"
        $certPath = "MuhasibPro.Package/workflow_cert.pfx"
        if (Test-Path $certPath) {
          $certSize = (Get-Item $certPath).Length
          Write-Host "✅ Certificate found: $certPath ($certSize bytes)"
        } else {
          Write-Host "❌ Certificate NOT found: $certPath"
        }

    - name: Create MSIX package
      shell: pwsh
      run: |
        try {
          # Proje dosyası varlığını kontrol et
          if (!(Test-Path $env:WAP_PROJECT_PATH)) {
            Write-Error "WAP project file not found: $env:WAP_PROJECT_PATH"
            Write-Host "Available files in src:"
            if (Test-Path "src") {
              Get-ChildItem "src" -Recurse -File "*.wapproj" | ForEach-Object { 
                Write-Host "Found WAP project: $($_.FullName)" 
              }
            }
            exit 1
          }
          
          # Certificate varlığını kontrol et
          $certPath = "MuhasibPro.Package/workflow_cert.pfx"
          if (!(Test-Path $certPath)) {
            Write-Error "Certificate file not found: $certPath"
            exit 1
          }
          
          # AppxPackages klasörünü temizle ve oluştur
          if (Test-Path "AppxPackages") {
            Remove-Item "AppxPackages" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "AppxPackages" -Force
          
          Write-Host "Building MSIX package..."
          Write-Host "WAP Project: $env:WAP_PROJECT_PATH"
          Write-Host "Version: $env:VERSION"
          
          # Absolute path'leri al
          $wapProjectFullPath = (Resolve-Path $env:WAP_PROJECT_PATH).Path
          $certFullPath = (Resolve-Path $certPath).Path
          $outputDirFullPath = (Resolve-Path "AppxPackages").Path + "\"
          
          Write-Host "Full WAP Project Path: $wapProjectFullPath"
          Write-Host "Full Certificate Path: $certFullPath"
          Write-Host "Output Directory: $outputDirFullPath"
          
          # MSBuild ile MSIX package oluştur
          Write-Host "=== Starting MSBuild ==="
          
          msbuild "$wapProjectFullPath" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PackageCertificateKeyFile="$certFullPath" `
            /p:PackageCertificatePassword="${{ secrets.PFX_KEY }}" `
            /p:AppxPackageDir="$outputDirFullPath" `
            /p:AppxBundle=Always `
            /p:GenerateAppxPackageOnBuild=true `
            /p:PublishReadyToRun=false `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /verbosity:detailed
          
          Write-Host "MSBuild exit code: $LASTEXITCODE"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSIX package build failed with exit code: $LASTEXITCODE"
            
            # Hata analizi
            Write-Host "=== ERROR ANALYSIS ==="
            Write-Host "Checking for common issues..."
            
            # Manifest kontrolü
            $manifestPath = "src/MuhasibProWap/Package.appxmanifest"
            if (Test-Path $manifestPath) {
              Write-Host "Manifest exists, checking version:"
              Get-Content $manifestPath | Select-String "Version="
            }
            
            # Dependencies kontrolü
            Write-Host "Checking dependencies in AppxPackages:"
            if (Test-Path "AppxPackages") {
              Get-ChildItem "AppxPackages" -Recurse | ForEach-Object {
                Write-Host "File: $($_.Name)"
              }
            }
            
            exit $LASTEXITCODE
          }
          
          Write-Host "MSIX package build completed successfully"
          
          # Build sonrası detaylı dosya kontrolü
          Write-Host "=== BUILD OUTPUT ANALYSIS ==="
          if (Test-Path "AppxPackages") {
            Write-Host "AppxPackages directory contents:"
            Get-ChildItem "AppxPackages" -Recurse | ForEach-Object {
              $sizeInfo = if ($_.PSIsContainer) { "[DIR]" } else { "[$($_.Length) bytes]" }
              Write-Host "  $($_.FullName) $sizeInfo"
            }
          } else {
            Write-Host "❌ AppxPackages directory was not created!"
          }
          
          # Workspace'deki tüm MSIX dosyalarını ara
          Write-Host "Searching for MSIX files in entire workspace:"
          Get-ChildItem -Recurse -Include "*.msix", "*.msixbundle" | ForEach-Object {
            Write-Host "Found MSIX: $($_.FullName) [$($_.Length) bytes]"
          }
          
        } catch {
          Write-Error "MSIX build failed with exception: $_"
          Write-Host "Exception details: $($_.Exception.Message)"
          Write-Host "Stack trace: $($_.ScriptStackTrace)"
          exit 1
        }

    - name: Find generated packages
      id: find-packages
      shell: pwsh
      run: |
        try {
          Write-Host "=== PACKAGE SEARCH ANALYSIS ==="
          Write-Host "Searching for generated packages..."
          
          # Önce tüm workspace'i tara
          Write-Host "Scanning entire workspace for MSIX files:"
          $allMsixFiles = Get-ChildItem -Recurse -Include "*.msix", "*.msixbundle" -ErrorAction SilentlyContinue
          
          if ($allMsixFiles.Count -gt 0) {
            Write-Host "Found MSIX files in workspace:"
            $allMsixFiles | ForEach-Object {
              Write-Host "  $($_.FullName) [$($_.Length) bytes]"
            }
          } else {
            Write-Host "No MSIX files found in entire workspace!"
          }
          
          # AppxPackages klasörünü kontrol et
          if (!(Test-Path "AppxPackages")) {
            Write-Host "❌ AppxPackages directory not found!"
            Write-Host "Available directories:"
            Get-ChildItem -Directory | ForEach-Object { Write-Host "  $($_.Name)" }
            
            # Alternatif output dizinlerini ara
            Write-Host "Searching for alternative output directories:"
            Get-ChildItem -Recurse -Directory -Include "*Package*", "*Output*", "*Publish*" -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Found directory: $($_.FullName)"
              $msixInDir = Get-ChildItem $_.FullName -Include "*.msix", "*.msixbundle" -Recurse -ErrorAction SilentlyContinue
              if ($msixInDir.Count -gt 0) {
                Write-Host "  Contains MSIX files:"
                $msixInDir | ForEach-Object { Write-Host "    $($_.Name)" }
              }
            }
            
            # Eğer hiç MSIX bulunamazsa, build işlemi başarısız
            if ($allMsixFiles.Count -eq 0) {
              Write-Error "No MSIX packages found anywhere! Build may have failed."
              Write-Host "Please check the MSBuild logs above for errors."
              exit 1
            }
          }
          
          # AppxPackages içeriğini kontrol et (varsa)
          if (Test-Path "AppxPackages") {
            Write-Host "AppxPackages directory contents:"
            Get-ChildItem "AppxPackages" -Recurse | ForEach-Object {
              $type = if ($_.PSIsContainer) { "[DIR]" } else { "[FILE]" }
              Write-Host "  $type $($_.FullName)"
            }
          }
          
          # MSIX ve MSIXBUNDLE dosyalarını ara (tüm workspace'de)
          $msixFiles = Get-ChildItem -Recurse -Include "*.msix" -ErrorAction SilentlyContinue | Where-Object { 
            $_.Name -notlike "*_Test*" -and $_.Name -notlike "*Dependencies*" -and $_.Name -notlike "*_x86_*" -and $_.Name -notlike "*_arm*"
          }
          $msixBundleFiles = Get-ChildItem -Recurse -Include "*.msixbundle" -ErrorAction SilentlyContinue
          
          Write-Host "Filtered MSIX files: $($msixFiles.Count)"
          Write-Host "Filtered MSIXBUNDLE files: $($msixBundleFiles.Count)"
          
          # En uygun paketi seç
          $mainPackage = $null
          $packageType = $null
          
          if ($msixBundleFiles.Count -gt 0) {
            # MSIXBUNDLE tercih et
            $mainPackage = $msixBundleFiles | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            $packageType = "msixbundle"
            Write-Host "Selected MSIXBUNDLE: $($mainPackage.FullName)"
          } elseif ($msixFiles.Count -gt 0) {
            # MSIX kullan
            $mainPackage = $msixFiles | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            $packageType = "msix"
            Write-Host "Selected MSIX: $($mainPackage.FullName)"
          } else {
            # Hiçbir uygun paket bulunamadı
            Write-Error "No suitable MSIX package found!"
            Write-Host "All found files:"
            Get-ChildItem -Recurse -Include "*.msix", "*.msixbundle" | ForEach-Object { 
              Write-Host "  $($_.Name) (excluded: Test=$($_.Name -like '*_Test*'), Dep=$($_.Name -like '*Dependencies*'), x86=$($_.Name -like '*_x86_*'), arm=$($_.Name -like '*_arm*'))"
            }
            exit 1
          }
          
          $packageName = $mainPackage.Name
          $packageFullPath = $mainPackage.FullName
          
          Write-Host "=== FINAL SELECTION ==="
          Write-Host "Selected package: $packageName"
          Write-Host "Package type: $packageType"  
          Write-Host "Full path: $packageFullPath"
          Write-Host "Size: $($mainPackage.Length) bytes"
          Write-Host "Created: $($mainPackage.CreationTime)"
          
          echo "main-package=$packageFullPath" >> $env:GITHUB_OUTPUT
          echo "package-type=$packageType" >> $env:GITHUB_OUTPUT
          echo "package-name=$packageName" >> $env:GITHUB_OUTPUT
          
        } catch {
          Write-Error "Package finding failed: $_"
          Write-Host "Exception: $($_.Exception.Message)"
          exit 1
        }

    - name: Calculate package hash
      id: hash
      shell: pwsh
      run: |
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        
        if (!(Test-Path $packagePath)) {
          Write-Error "Package file not found: $packagePath"
          exit 1
        }
        
        $hash = Get-FileHash -Path $packagePath -Algorithm SHA256
        echo "package-hash=$($hash.Hash)" >> $env:GITHUB_OUTPUT
        Write-Host "Package hash: $($hash.Hash)"
        
        # Package bilgilerini göster
        $packageInfo = Get-Item $packagePath
        Write-Host "Package size: $($packageInfo.Length) bytes"
        Write-Host "Package created: $($packageInfo.CreationTime)"

    - name: Generate update manifest
      shell: pwsh
      run: |
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        $packageItem = Get-Item $packagePath
        
        $manifest = @{
          version = "$env:VERSION"
          buildNumber = "${{ steps.version.outputs.build-number }}"
          releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          packages = @{
            full = @{
              name = "${{ steps.find-packages.outputs.package-name }}"
              size = $packageItem.Length
              hash = "${{ steps.hash.outputs.package-hash }}"
              url = "https://github.com/${{ github.repository }}/releases/download/v$env:VERSION/${{ steps.find-packages.outputs.package-name }}"
            }
          }
          previousVersion = "${{ steps.download-previous.outputs.previous-version }}"
          updateType = "full"
        }
        
        $manifestJson = $manifest | ConvertTo-Json -Depth 10
        $manifestJson | Out-File -FilePath "update-manifest.json" -Encoding utf8
        
        Write-Host "Update manifest generated successfully:"
        Write-Host $manifestJson

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: msix-packages-${{ steps.version.outputs.version }}
        path: |
          ${{ steps.find-packages.outputs.main-package }}
          update-manifest.json
        retention-days: 90
        if-no-files-found: error

    - name: List all build outputs (Debug)
      if: always()
      shell: pwsh
      run: |
        Write-Host "=== FINAL BUILD OUTPUT DEBUG ==="
        
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Current directory contents:"
        Get-ChildItem -Force | ForEach-Object {
          $size = if ($_.PSIsContainer) { "[DIR]" } else { "[$($_.Length) bytes]" }
          Write-Host "  $($_.Name) $size"
        }
        
        if (Test-Path "AppxPackages") {
          Write-Host "AppxPackages contents:"
          Get-ChildItem "AppxPackages" -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName) - $($_.Length) bytes"
          }
        }
        
        Write-Host "All MSIX files in workspace:"
        Get-ChildItem -Recurse -Include "*.msix", "*.msixbundle" -ErrorAction SilentlyContinue | ForEach-Object {
          Write-Host "  $($_.FullName) - $($_.Length) bytes"
        }
        
        Write-Host "Artifact upload paths:"
        Write-Host "Main package path: ${{ steps.find-packages.outputs.main-package }}"
        Write-Host "Package name: ${{ steps.find-packages.outputs.package-name }}"
        Write-Host "Package type: ${{ steps.find-packages.outputs.package-type }}"
        
        # Package dosyasının gerçekten var olup olmadığını kontrol et
        $packagePath = "${{ steps.find-packages.outputs.main-package }}"
        if (Test-Path $packagePath) {
          $packageInfo = Get-Item $packagePath
          Write-Host "✅ Package file exists: $($packageInfo.FullName)"
          Write-Host "   Size: $($packageInfo.Length) bytes"
          Write-Host "   Modified: $($packageInfo.LastWriteTime)"
        } else {
          Write-Host "❌ Package file NOT found: $packagePath"
        }
        
        if (Test-Path "update-manifest.json") {
          Write-Host "✅ Update manifest exists"
          Write-Host "Manifest content:"
          Get-Content "update-manifest.json" | Write-Host
        } else {
          Write-Host "❌ Update manifest NOT found"
        }

  release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: msix-packages-${{ needs.build-and-package.outputs.version }}
        path: ./artifacts

    - name: Verify downloaded artifacts
      run: |
        echo "📋 Verifying downloaded artifacts..."
        echo "Current directory contents:"
        ls -la
        
        echo "Artifacts directory contents:"
        if [ -d "artifacts" ]; then
          ls -la artifacts/
          echo "All files in artifacts recursively:"
          find artifacts/ -type f -exec ls -lh {} \;
        else
          echo "❌ Artifacts directory not found!"
        fi
        
        # MSIX/MSIXBUNDLE dosyalarını kontrol et
        echo "Searching for MSIX files:"
        find . -name "*.msix" -o -name "*.msixbundle" | while read file; do
          echo "Found MSIX: $file ($(du -h "$file" | cut -f1))"
        done
        
        msix_count=$(find . -name "*.msix" -o -name "*.msixbundle" | wc -l)
        echo "Total MSIX files found: $msix_count"
        
        if [ "$msix_count" -eq 0 ]; then
          echo "❌ No MSIX packages found in artifacts!"
          echo "Available files:"
          find . -type f | head -20
          exit 1
        fi
        
        echo "✅ Found $msix_count MSIX package(s)"

    - name: Copy artifacts to root directory
      run: |
        echo "📋 Copying artifacts to root directory..."
        if [ -d "artifacts" ]; then
          # MSIX dosyalarını özyinelemeli olarak ara ve root'a kopyala
          echo "🔍 Searching for MSIX files in artifacts..."
          find artifacts/ -name "*.msix" -o -name "*.msixbundle" | while read file; do
            filename=$(basename "$file")
            echo "📦 Copying: $file -> $filename ($(du -h "$file" | cut -f1))"
            cp "$file" "$filename"
          done
          
          # JSON dosyalarını da kopyala
          find artifacts/ -name "*.json" | while read file; do
            filename=$(basename "$file")
            if [ ! -f "$filename" ]; then
              echo "📝 Copying: $file -> $filename"
              cp "$file" "$filename"
            fi
          done
          
          # Sonucu kontrol et
          echo "✅ Files in root after copy:"
          ls -la *.msix *.msixbundle *.json 2>/dev/null || echo "No target files found in root"
        fi

    - name: Create GitHub Release
      id: create-release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.build-and-package.outputs.version }}
        name: MuhasibPro v${{ needs.build-and-package.outputs.version }}
        body: |
          ## MuhasibPro v${{ needs.build-and-package.outputs.version }}
          
          ### 📦 Bu Sürümde
          - Otomatik build #${{ needs.build-and-package.outputs.build-number }}
          - Commit: ${{ github.sha }}
          
          ### 🚀 Kurulum
          1. Aşağıdaki MSIX paketini indirin
          2. Gerekirse sertifika kurun  
          3. Çift tıklayıp kurun
          
          ### ✨ Özellikler
          - Otomatik güncellemeler
          - Delta update desteği
          - Güvenli imza
        draft: false
        prerelease: false
        files: |
          *.msix
          *.msixbundle
          update-manifest.json
#
# 1. Configure environment variables
# GitHub sets default environment variables for every workflow run.
# Replace the variables relative to your project in the "env" section below.
#
# 2. Signing
# Generate a signing certificate in the Windows Application
# Packaging Project or add an existing signing certificate to the project.
# Next, use PowerShell to encode the .pfx file using Base64 encoding
# by running the following Powershell script to generate the output string:
#
# $pfx_cert = Get-Content '.\SigningCertificate.pfx' -Encoding Byte
# [System.Convert]::ToBase64String($pfx_cert) | Out-File 'SigningCertificate_Encoded.txt'
#
# Open the output file, SigningCertificate_Encoded.txt, and copy the
# string inside. Then, add the string to the repo as a GitHub secret
# and name it "Base64_Encoded_Pfx."
# For more information on how to configure your signing certificate for
# this workflow, refer to https://github.com/microsoft/github-actions-for-desktop-apps#signing
#
# Finally, add the signing certificate password to the repo as a secret and name it "Pfx_Key".
# See "Build the Windows Application Packaging project" below to see how the secret is used.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Action workflows for Desktop Applications,
# refer to https://github.com/microsoft/github-actions-for-desktop-apps

name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: your-solution-name                         # Replace with your solution name, i.e. MyWpfApp.sln.
      Test_Project_Path: your-test-project-path                 # Replace with the path to your test project, i.e. MyWpfApp.Tests\MyWpfApp.Tests.csproj.
      Wap_Project_Directory: your-wap-project-directory-name    # Replace with the Wap project directory relative to the solution, i.e. MyWpfApp.Package.
      Wap_Project_Path: your-wap-project-path                   # Replace with the path to your Wap project, i.e. MyWpf.App.Package\MyWpfApp.Package.wapproj.

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test

    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # Decode the base 64 encoded pfx and save the Signing_Certificate
    - name: Decode the pfx
      run: |
        $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
        $certificatePath = Join-Path -Path $env:Wap_Project_Directory -ChildPath GitHubActionsWorkflow.pfx
        [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)

    # Create the app package by building and packaging the Windows Application Packaging project
    - name: Create the app package
      run: msbuild $env:Wap_Project_Path /p:Configuration=$env:Configuration /p:UapAppxPackageBuildMode=$env:Appx_Package_Build_Mode /p:AppxBundle=$env:Appx_Bundle /p:PackageCertificateKeyFile=GitHubActionsWorkflow.pfx /p:PackageCertificatePassword=${{ secrets.Pfx_Key }}
      env:
        Appx_Bundle: Always
        Appx_Bundle_Platforms: x86|x64
        Appx_Package_Build_Mode: StoreUpload
        Configuration: ${{ matrix.configuration }}

    # Remove the pfx
    - name: Remove the pfx
      run: Remove-Item -path $env:Wap_Project_Directory\GitHubActionsWorkflow.pfx

    # Upload the MSIX package: https://github.com/marketplace/actions/upload-a-build-artifact
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MSIX Package
        path: ${{ env.Wap_Project_Directory }}\AppPackages
