# .github/workflows/dotnet-desktop-cicd.yml

name: .NET Desktop CI/CD with ClickOnce Deployment

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    env:
      SOLUTION_NAME: MuhasibPro.sln
      PROJECT_PATH: "src/MuhasibPro/MuhasibPro.csproj"  # Ana WPF/WinForms projesi
      RUNTIME_IDENTIFIER: win-x64
      APP_NAME: MuhasibPro
      PUBLISH_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
      WAP_PROJECT_PATH: "src/MuhasibProWap/MuhasibProWap.wapproj"  # WAP projesi eklendi

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}
      tag-name: ${{ steps.version.outputs.tag-name }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version number
      id: version
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          $tagVersion = "${{ github.ref }}".Replace("refs/tags/v", "")
          $version = "$tagVersion.0"
          $tagName = "${{ github.ref }}".Replace("refs/tags/", "")
          Write-Host "Using existing tag: $tagName"
        } else {
          $buildNumber = ${{ github.run_number }}
          $version = "1.0.0.$buildNumber"
          $tagName = "v$version"
          Write-Host "Generated version for branch: $version"
        }
        
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "build-number=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        echo "tag-name=$tagName" >> $env:GITHUB_OUTPUT
        echo "VERSION=$version" >> $env:GITHUB_ENV
        
        Write-Host "Final version: $version"
        Write-Host "Tag name: $tagName"

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      shell: pwsh
      run: |
        Write-Host "Restoring NuGet packages..."
        dotnet restore $env:SOLUTION_NAME
        Write-Host "NuGet restore completed"

    - name: Download previous release (for update detection)
      id: download-previous
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            if (releases.data.length > 0) {
              const latestRelease = releases.data[0];
              core.setOutput('has-previous', 'true');
              core.setOutput('previous-version', latestRelease.tag_name);
            } else {
              core.setOutput('has-previous', 'false');
            }
          } catch (error) {
            console.log('No previous release found');
            core.setOutput('has-previous', 'false');
          }

    - name: Update AssemblyInfo version
      shell: pwsh
      run: |
        # AssemblyInfo.cs dosyasını bul ve güncelle
        $assemblyFiles = Get-ChildItem -Path "." -Filter "AssemblyInfo.cs" -Recurse
        
        foreach ($file in $assemblyFiles) {
          Write-Host "Updating version in: $($file.FullName)"
          
          $content = Get-Content $file.FullName -Raw
          $content = $content -replace 'AssemblyVersion\(".*?"\)', "AssemblyVersion(`"$env:VERSION`")"
          $content = $content -replace 'AssemblyFileVersion\(".*?"\)', "AssemblyFileVersion(`"$env:VERSION`")"
          
          Set-Content -Path $file.FullName -Value $content -Encoding UTF8
        }
        
        # Proje dosyasındaki version'ı da güncelle
        if (Test-Path $env:PROJECT_PATH) {
          Write-Host "Updating version in project file: $env:PROJECT_PATH"
          [xml]$project = Get-Content $env:PROJECT_PATH
          
          # Version properties'ini bul/oluştur
          $propertyGroup = $project.Project.PropertyGroup | Where-Object { $_.Version -or $_.AssemblyVersion } | Select-Object -First 1
          if (-not $propertyGroup) {
            $propertyGroup = $project.CreateElement("PropertyGroup")
            $project.Project.AppendChild($propertyGroup) | Out-Null
          }
          
          # Version elementlerini güncelle/oluştur
          @("Version", "AssemblyVersion", "FileVersion", "ApplicationVersion") | ForEach-Object {
            $element = $propertyGroup.$_
            if ($element) {
              $element = $env:VERSION
            } else {
              $newElement = $project.CreateElement($_)
              $newElement.InnerText = $env:VERSION
              $propertyGroup.AppendChild($newElement) | Out-Null
            }
          }
          
          $project.Save($env:PROJECT_PATH)
          Write-Host "Project file updated with version: $env:VERSION"
        }

    - name: Verify project structure
      shell: pwsh
      run: |
        Write-Host "=== PROJECT STRUCTURE VERIFICATION ==="
        Write-Host "Current directory: $(Get-Location)"
        
        Write-Host "Solution file check:"
        if (Test-Path $env:SOLUTION_NAME) {
          Write-Host "✅ Solution found: $env:SOLUTION_NAME"
        } else {
          Write-Host "❌ Solution NOT found: $env:SOLUTION_NAME"
          exit 1
        }
        
        Write-Host "Main project check:"
        if (Test-Path $env:PROJECT_PATH) {
          Write-Host "✅ Main project found: $env:PROJECT_PATH"
          
          # Proje türünü kontrol et
          [xml]$project = Get-Content $env:PROJECT_PATH
          $sdk = $project.Project.Sdk
          $outputType = $project.Project.PropertyGroup.OutputType
          $targetFramework = $project.Project.PropertyGroup.TargetFramework
          
          Write-Host "   SDK: $sdk"
          Write-Host "   Output Type: $outputType" 
          Write-Host "   Target Framework: $targetFramework"
        } else {
          Write-Host "❌ Main project NOT found: $env:PROJECT_PATH"
          Write-Host "Available project files:"
          Get-ChildItem -Path "." -Filter "*.csproj" -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }
          exit 1
        }
        
        # WAP projesi kontrolü
        Write-Host "WAP project check:"
        if (Test-Path $env:WAP_PROJECT_PATH) {
          Write-Host "✅ WAP project found: $env:WAP_PROJECT_PATH"
        } else {
          Write-Host "⚠️ WAP project NOT found: $env:WAP_PROJECT_PATH"
        }

    # DÜZELTME: Çözüm seviyesinde RID kullanımı kaldırıldı
    - name: Build solution
      shell: pwsh
      run: |
        Write-Host "Building solution: $env:SOLUTION_NAME"
        
        # Çözümü RID olmadan build et
        dotnet build $env:SOLUTION_NAME `
          --configuration Release `
          --verbosity normal
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Solution build failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        
        Write-Host "Solution build completed successfully"

    # YENİ EKLEME: WAP projesi için ayrı build adımı
    - name: Build WAP project
      shell: pwsh
      run: |
        Write-Host "Building WAP project: $env:WAP_PROJECT_PATH"
        
        if (Test-Path $env:WAP_PROJECT_PATH) {
          msbuild $env:WAP_PROJECT_PATH `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxBundle=Never
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "WAP project build failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "✅ WAP project build completed"
        } else {
          Write-Host "⚠️ WAP project not found, skipping build"
        }

    # DÜZELTME: Ana proje için publish kullanımı (RID burada belirtiliyor)
    - name: Create ClickOnce deployment
      shell: pwsh
      run: |
        try {
          # Publish klasörünü temizle
          $publishDir = "publish"
          if (Test-Path $publishDir) {
            Remove-Item $publishDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null
          
          Write-Host "Creating ClickOnce deployment..."
          Write-Host "Project: $env:PROJECT_PATH"
          Write-Host "Version: $env:VERSION"
          Write-Host "Publish URL: $env:PUBLISH_URL"
          Write-Host "Runtime: $env:RUNTIME_IDENTIFIER"
          
          # ClickOnce publish komutu (RID burada kullanılıyor)
          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime $env:RUNTIME_IDENTIFIER `
            --self-contained true `
            --output "publish" `
            /p:PublishUrl="$env:PUBLISH_URL" `
            /p:ApplicationVersion="$env:VERSION" `
            /p:PublishSingleFile=false `
            /p:PublishReadyToRun=false `
            /p:EnableCompressionInSingleFile=false `
            --verbosity normal
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ClickOnce publish failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          
          Write-Host "✅ ClickOnce deployment created successfully"
          
          # Publish sonuçlarını kontrol et
          Write-Host "=== PUBLISH OUTPUT ANALYSIS ==="
          if (Test-Path $publishDir) {
            Write-Host "Publish directory contents:"
            Get-ChildItem $publishDir -Recurse | ForEach-Object {
              $type = if ($_.PSIsContainer) { "[DIR]" } else { "[FILE - $($_.Length) bytes]" }
              Write-Host "  $type $($_.Name)"
            }
          }
          
        } catch {
          Write-Error "ClickOnce deployment failed: $_"
          exit 1
        }

    - name: Create traditional installer (as backup)
      shell: pwsh
      run: |
        Write-Host "Creating traditional installer package..."
        
        # Installer için klasör oluştur
        $installerDir = "installer"
        if (Test-Path $installerDir) {
          Remove-Item $installerDir -Recurse -Force
        }
        New-Item -ItemType Directory -Path $installerDir -Force | Out-Null
        
        # App files'ı kopyala
        Copy-Item "publish/*" -Destination $installerDir -Recurse -Force
        
        # Setup script oluştur
        $setupScript = @"
        @echo off
        title MuhasibPro v$env:VERSION Kurulum
        color 0A

        echo.
        echo  ╔═══════════════════════════════════════╗
        echo  ║         MuhasibPro Kurulum            ║
        echo  ║            v$env:VERSION                     ║
        echo  ╚═══════════════════════════════════════╝
        echo.
        REM Yönetici kontrolü
        net session >nul 2>&1
        if %errorLevel% == 0 (
        echo ✅ Administrator yetkisi onaylandı
        ) else (
        echo ⚠️  Bu kurulum Administrator yetkisi gerektirir
        echo    Lütfen "Yönetici olarak çalıştır" ile açın
        echo.
        pause
        exit /b 1
        )
        REM Program Files klasörü oluştur
        set "INSTALL_DIR=%ProgramFiles%\MuhasibPro"
        echo 📁 Kurulum dizini: %INSTALL_DIR%
        if not exist "%INSTALL_DIR%" (
        mkdir "%INSTALL_DIR%" 2>nul
        if %errorLevel% neq 0 (
        echo ❌ Kurulum dizini oluşturulamadı
        pause
        exit /b 1
        )
        )

        REM Dosyaları kopyala  
        echo 📋 Uygulama dosyaları kopyalanıyor...
        xcopy "%~dp0*.*" "%INSTALL_DIR%\" /E /H /Y /Q >nul 2>&1
        if %errorLevel% neq 0 (
            echo ❌ Dosya kopyalama başarısız
            pause
            exit /b 1
        )

        REM Desktop kısayolu oluştur
        echo 🔗 Masaüstü kısayolu oluşturuluyor...
        set "SHORTCUT_PATH=%USERPROFILE%\Desktop\MuhasibPro.lnk"
        powershell -Command `"(New-Object -ComObject WScript.Shell).CreateShortcut('%SHORTCUT_PATH%').TargetPath='%INSTALL_DIR%\$env:APP_NAME.exe'; (New-Object -ComObject WScript.Shell).CreateShortcut('%SHORTCUT_PATH%').Save()`" 2>nul
        
        REM Start Menu kısayolu
        echo 📌 Başlat menüsü kısayolu oluşturuluyor...
        set "START_MENU=%ProgramData%\Microsoft\Windows\Start Menu\Programs"
        if not exist "%START_MENU%\MuhasibPro" mkdir "%START_MENU%\MuhasibPro" 2>nul
        set "START_SHORTCUT=%START_MENU%\MuhasibPro\MuhasibPro.lnk"
        powershell -Command `"(New-Object -ComObject WScript.Shell).CreateShortcut('%START_SHORTCUT%').TargetPath='%INSTALL_DIR%\$env:APP_NAME.exe'; (New-Object -ComObject WScript.Shell).CreateShortcut('%START_SHORTCUT%').Save()`" 2>nul
        
        REM Uninstaller oluştur
        echo 🗑️  Kaldırıcı oluşturuluyor...
        echo @echo off > "%INSTALL_DIR%\uninstall.bat"
        echo title MuhasibPro Kaldır >> "%INSTALL_DIR%\uninstall.bat"
        echo echo MuhasibPro kaldırılıyor... >> "%INSTALL_DIR%\uninstall.bat"
        echo taskkill /f /im "$env:APP_NAME.exe" 2^>nul >> "%INSTALL_DIR%\uninstall.bat"
        echo timeout /t 2 /nobreak ^>nul >> "%INSTALL_DIR%\uninstall.bat"
        echo rmdir /s /q "%INSTALL_DIR%" >> "%INSTALL_DIR%\uninstall.bat"
        echo del "%USERPROFILE%\Desktop\MuhasibPro.lnk" 2^>nul >> "%INSTALL_DIR%\uninstall.bat"
        echo rmdir /s /q "%START_MENU%\MuhasibPro" 2^>nul >> "%INSTALL_DIR%\uninstall.bat"
        echo echo MuhasibPro başarıyla kaldırıldı >> "%INSTALL_DIR%\uninstall.bat"
        echo pause >> "%INSTALL_DIR%\uninstall.bat"
        
        echo.
        echo ✅ MuhasibPro v$env:VERSION başarıyla kuruldu!
        echo.
        echo 📍 Kurulum Dizini: %INSTALL_DIR%
        echo 🖥️  Masaüstü kısayolu oluşturuldu
        echo 📌 Başlat menüsünde bulabilirsiniz
        echo.
        echo MuhasibPro'yu başlatmak için herhangi bir tuşa basın...
        pause >nul

        start "" "%INSTALL_DIR%\$env:APP_NAME.exe"
        "@
        
        $setupScript | Out-File -FilePath "$installerDir\setup.bat" -Encoding ASCII
        
        Write-Host "✅ Installer package created in: $installerDir"

    - name: Create application manifest
      shell: pwsh
      run: |
        # ClickOnce için application manifest oluştur
        $manifest = @{
          name = "$env:APP_NAME"
          version = "$env:VERSION"
          buildNumber = "${{ steps.version.outputs.build-number }}"
          releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          publishUrl = "$env:PUBLISH_URL"
          updateUrl = "$env:PUBLISH_URL"
          deploymentType = "ClickOnce"
          previousVersion = "${{ steps.download-previous.outputs.previous-version }}"
          hasUpdate = "${{ steps.download-previous.outputs.has-previous }}"
          downloadUrls = @{
            clickonce = "$env:PUBLISH_URL"
            installer = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag-name }}/MuhasibPro-Setup-v$env:VERSION.zip"
            portable = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag-name }}/MuhasibPro-Portable-v$env:VERSION.zip"
          }
        }
        
        $manifestJson = $manifest | ConvertTo-Json -Depth 10
        $manifestJson | Out-File -FilePath "app-manifest.json" -Encoding utf8
        
        Write-Host "Application manifest generated"

        - name: Create distribution packages
        shell: pwsh
        run: |
          Write-Host "Creating distribution packages..."
        
        # 1. ClickOnce deployment paketi
        if (Test-Path "publish") {
          Write-Host "📦 Creating ClickOnce package..."
          Compress-Archive -Path "publish\*" -DestinationPath "MuhasibPro-ClickOnce-v$env:VERSION.zip" -Force
          Write-Host "✅ ClickOnce package: MuhasibPro-ClickOnce-v$env:VERSION.zip"
        }
        
        # 2. Traditional installer paketi  
        if (Test-Path "installer") {
          Write-Host "📦 Creating Installer package..."
          Compress-Archive -Path "installer\*" -DestinationPath "MuhasibPro-Setup-v$env:VERSION.zip" -Force
          Write-Host "✅ Installer package: MuhasibPro-Setup-v$env:VERSION.zip"
        }
        
        # 3. Portable paketi
        Write-Host "📦 Creating Portable package..."
        $portableDir = "portable"
        New-Item -ItemType Directory -Path $portableDir -Force | Out-Null
        Copy-Item "publish\*" -Destination $portableDir -Recurse -Force
        
        # Portable için README oluştur
        $portableReadme = @"
        # MuhasibPro Portable v$env:VERSION
        
        ## Kullanım
        1. Bu klasörü istediğiniz yere kopyalayın
        2. $env:APP_NAME.exe dosyasını çalıştırın
        3. Kurulum gerektirmez!
        
        ## Özellikler
        - ✅ Kurulum gerektirmez
        - ✅ Registry değişikliği yapmaz  
        - ✅ USB'de taşınabilir
        - ✅ Tam özellikli uygulama
        
        ## Sistem Gereksinimleri
        - Windows 10/11 (x64)
        - .NET 8 Runtime (otomatik dahil)
        
        ## Güncelleme
        Yeni sürüm için:
        https://github.com/${{ github.repository }}/releases
        
        Tarih: $(Get-Date -Format 'dd.MM.yyyy HH:mm')
        Sürüm: $env:VERSION
        Build: ${{ steps.version.outputs.build-number }}
        "@
        
        $portableReadme | Out-File -FilePath "$portableDir\PORTABLE_README.txt" -Encoding UTF8
        
        Compress-Archive -Path "$portableDir\*" -DestinationPath "MuhasibPro-Portable-v$env:VERSION.zip" -Force
        Write-Host "✅ Portable package: MuhasibPro-Portable-v$env:VERSION.zip"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: muhasibpro-packages-${{ steps.version.outputs.version }}
        path: |
          MuhasibPro-ClickOnce-v${{ steps.version.outputs.version }}.zip
          MuhasibPro-Setup-v${{ steps.version.outputs.version }}.zip
          MuhasibPro-Portable-v${{ steps.version.outputs.version }}.zip
          app-manifest.json
        retention-days: 90

    - name: List build outputs (Debug)
      if: always()
      shell: pwsh
      run: |
        Write-Host "=== FINAL BUILD OUTPUT DEBUG ==="
        Write-Host "Version: $env:VERSION"
        Write-Host "Tag: ${{ steps.version.outputs.tag-name }}"
        
        Get-ChildItem -Path "." -Filter "*.zip" | ForEach-Object {
          Write-Host "📦 Package: $($_.Name) - $([math]::Round($_.Length / 1MB, 2)) MB"
        }
        
        if (Test-Path "publish") {
          $publishSize = (Get-ChildItem "publish" -Recurse | Measure-Object -Property Length -Sum).Sum
          Write-Host "📁 Publish folder: $([math]::Round($publishSize / 1MB, 2)) MB"
        }
        
        if (Test-Path "installer") {
          Write-Host "✅ Installer files ready"
        }
        
        if (Test-Path "portable") {
          Write-Host "✅ Portable files ready"
        }

  release:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: muhasibpro-packages-${{ needs.build-and-deploy.outputs.version }}
        path: ./artifacts

    - name: Verify downloaded artifacts
      run: |
        echo "📋 Verifying downloaded artifacts..."
        find artifacts/ -type f -exec ls -lh {} \;
        
        zip_count=$(find . -name "*.zip" | wc -l)
        if [ "$zip_count" -eq 0 ]; then
          echo "❌ No packages found!"
          exit 1
        fi
        echo "✅ Found $zip_count package(s)"

    - name: Copy artifacts to root directory
      run: |
        if [ -d "artifacts" ]; then
          find artifacts/ -name "*.zip" -o -name "*.json" | while read file; do
            filename=$(basename "$file")
            cp "$file" "$filename"
            echo "📦 Copied: $filename ($(du -h "$filename" | cut -f1))"
          done
        fi

    - name: Update existing release or create new one
      id: update-release
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const tagName = '${{ needs.build-and-deploy.outputs.tag-name }}';
          const version = '${{ needs.build-and-deploy.outputs.version }}';
          
          const releaseBody = `## 🚀 MuhasibPro v${version}
          
          ### 📦 Bu Sürümde
          - Otomatik build #${{ needs.build-and-deploy.outputs.build-number }}
          - Commit: ${{ github.sha }}
          - ClickOnce deployment desteği
          - Geleneksel installer seçeneği
          - Portable sürüm
          
          ### 💾 İndirme Seçenekleri
          
          #### 🎯 ClickOnce Deployment (Önerilen)
          - **MuhasibPro-ClickOnce-v${version}.zip** - Otomatik güncelleme destekli
          - İndirin, açın, setup.exe'yi çalıştırın
          - Otomatik güncellemeler alırsınız
          
          #### 🛠️ Geleneksel Kurulum
          - **MuhasibPro-Setup-v${version}.zip** - Klasik installer
          - İndirin, açın, setup.bat'ı Admin olarak çalıştırın
          - Start menü ve masaüstü kısayolları oluşturur
          
          #### 📱 Portable Sürüm  
          - **MuhasibPro-Portable-v${version}.zip** - Kurulum gerektirmez
          - İndirin, açın, MuhasibPro.exe'yi çalıştırın
          - USB'de taşıyabilir, kurulum yapmaz
          
          ### 🔧 Sistem Gereksinimleri
          - Windows 10/11 (64-bit)
          - .NET 8 Runtime (paketlerde dahil)
          - Minimum 100MB disk alanı
          
          ### ✨ Yenilikler
          - 🚀 Hızlı kurulum seçenekleri
          - 🔄 Otomatik güncelleme (ClickOnce)
          - 📦 Sertifika gerektirmeyen kurulum
          - 🛡️ Windows Defender uyumlu
          `;
          
          try {
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName
            });
            
            const { data: updatedRelease } = await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: releaseBody,
              draft: false,
              prerelease: false
            });
            
            core.setOutput('release-id', updatedRelease.id);
            console.log(`Updated existing release: ${updatedRelease.id}`);
            
          } catch (error) {
            if (error.status === 404) {
              const { data: newRelease } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: `MuhasibPro v${version}`,
                body: releaseBody,
                draft: false,
                prerelease: false
              });
              
              core.setOutput('release-id', newRelease.id);
              console.log(`Created new release: ${newRelease.id}`);
            } else {
              throw error;
            }
          }

    - name: Upload Release Assets
      run: |
        echo "🎁 Release assets yükleniyor..."
        
        uploaded_count=0
        
        # Tüm ZIP dosyalarını yükle
        for file in *.zip; do
          if [ -f "$file" ]; then
            echo "📦 Uploading: $file ($(du -h "$file" | cut -f1))"
            
            curl_response=$(curl -w "%{http_code}" -s -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/zip" \
              --data-binary "@$file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.update-release.outputs.release-id }}/assets?name=$file")
            
            http_code="${curl_response: -3}"
            if [ "$http_code" = "201" ]; then
              echo "✅ Successfully uploaded: $file"
              uploaded_count=$((uploaded_count + 1))
            else
              echo "❌ Failed to upload $file (HTTP: $http_code)"
            fi
          fi
        done
        
        # App manifest'i yükle
        if [ -f "app-manifest.json" ]; then
          echo "📝 Uploading app-manifest.json"
          curl -s -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary "@app-manifest.json" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.update-release.outputs.release-id }}/assets?name=app-manifest.json"
          echo "✅ App manifest uploaded"
        fi
        
        if [ "$uploaded_count" -eq 0 ]; then
          echo "❌ No packages were uploaded!"
          exit 1
        fi
        
        echo "🎉 $uploaded_count paket başarıyla yüklendi!"
        echo ""
        echo "📋 Kullanıcılar için indirme seçenekleri:"
        echo "   🎯 ClickOnce (Önerilen): MuhasibPro-ClickOnce-v${{ needs.build-and-deploy.outputs.version }}.zip"
        echo "   🛠️  Geleneksel Kurulum: MuhasibPro-Setup-v${{ needs.build-and-deploy.outputs.version }}.zip"  
        echo "   📱 Portable: MuhasibPro-Portable-v${{ needs.build-and-deploy.outputs.version }}.zip"

  deploy-clickonce:
    needs: [build-and-deploy, release]
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout gh-pages branch
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages
      continue-on-error: true

    - name: Download ClickOnce artifacts
      uses: actions/download-artifact@v4
      with:
        name: muhasibpro-packages-${{ needs.build-and-deploy.outputs.version }}
        path: ./artifacts

    - name: Setup ClickOnce hosting
      run: |
        echo "🌐 Setting up ClickOnce hosting on GitHub Pages..."
        
        # gh-pages klasörü oluştur (eğer yoksa)
        mkdir -p gh-pages
        cd gh-pages
        
        # Git config
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # ClickOnce files'ı extract et
        if [ -f "../artifacts/MuhasibPro-ClickOnce-v${{ needs.build-and-deploy.outputs.version }}.zip" ]; then
          echo "📦 Extracting ClickOnce package..."
          unzip -o "../artifacts/MuhasibPro-ClickOnce-v${{ needs.build-and-deploy.outputs.version }}.zip"
          
          # Index.html oluştur
          cat > index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="tr">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>MuhasibPro ClickOnce Deployment</title>
          <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
            header { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); padding: 40px 20px; border-radius: 10px; color: white; text-align: center; margin-bottom: 30px; }
            h1 { margin: 0; font-size: 2.5rem; }
            .version { font-size: 1.2rem; opacity: 0.9; }
            .card { background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 25px; }
            .btn { display: inline-block; background: #4caf50; color: white; padding: 12px 25px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: all 0.3s; }
            .btn:hover { background: #388e3c; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
            footer { text-align: center; margin-top: 40px; color: #666; }
          </style>
        </head>
        <body>
          <header>
            <h1>MuhasibPro</h1>
            <div class="version">v${{ needs.build-and-deploy.outputs.version }}</div>
          </header>
          
          <div class="card">
            <h2>📥 Uygulamayı Yükle</h2>
            <p>MuhasibPro'yu bilgisayarınıza yüklemek için aşağıdaki butona tıklayın:</p>
            <a href="setup.exe" class="btn">Yükleme Başlat</a>
            <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">Not: Yükleme sırasında güvenlik uyarısı alırsanız "Çalıştır" seçeneğini seçin.</p>
          </div>
          
          <div class="card">
            <h2>ℹ️ Hakkında</h2>
            <p>MuhasibPro ClickOnce teknolojisi ile dağıtılan bir muhasebe uygulamasıdır. Bu yöntem:</p>
            <ul>
              <li>Kurulumu basitleştirir</li>
              <li>Otomatik güncelleme sağlar</li>
              <li>Güvenli ve güncel kalmanızı garanti eder</li>
            </ul>
          </div>
          
          <div class="card">
            <h2>🔧 Sistem Gereksinimleri</h2>
            <ul>
              <li>Windows 10/11 (64-bit)</li>
              <li>.NET 8 Runtime</li>
              <li>500MB boş disk alanı</li>
              <li>4GB RAM</li>
            </ul>
          </div>
          
          <footer>
            <p>© 2024 MuhasibPro - Tüm hakları saklıdır</p>
            <p>Build: #${{ needs.build-and-deploy.outputs.build-number }} | ${{ steps.update-release.outputs.release-date }}</p>
          </footer>
        </body>
        </html>
        EOF
          
          git add .
          git commit -m "Update ClickOnce deployment for v${{ needs.build-and-deploy.outputs.version }}"
          git push origin gh-pages
        else
          echo "❌ ClickOnce package not found!"
          exit 1
        fi
